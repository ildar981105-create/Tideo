<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>创作 — Tideo</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
    /* ===== create.html 首页 — AI 统一入口 ===== */
    .create-home {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 40px 32px;
        overflow-y: auto;
    }
    .create-home::-webkit-scrollbar { width: 5px; }
    .create-home::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }

    .create-home-inner {
        max-width: 720px;
        width: 100%;
        text-align: center;
    }

    /* ---- Hero 标题 ---- */
    .create-hero {
        margin-bottom: 32px;
    }
    .create-hero h1 {
        font-size: 2rem;
        font-weight: 800;
        line-height: 1.35;
        margin: 0 0 10px;
        letter-spacing: -0.02em;
    }
    .create-hero h1 .gradient-text {
        background: linear-gradient(135deg, #a855f7, #6366f1, #06b6d4);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }
    .create-hero p {
        font-size: 0.9rem;
        color: var(--text-muted);
        margin: 0;
    }

    /* ---- Skill 选择器胶囊 ---- */
    .skill-selector {
        display: flex;
        justify-content: center;
        gap: 8px;
        margin-bottom: 20px;
        flex-wrap: wrap;
    }
    .skill-pill {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        padding: 8px 18px;
        font-size: 0.82rem;
        font-weight: 600;
        color: var(--text-muted);
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 100px;
        cursor: pointer;
        transition: all 0.25s ease;
        font-family: inherit;
        position: relative;
        white-space: nowrap;
    }
    .skill-pill:hover {
        color: var(--text-primary);
        border-color: rgba(255,255,255,0.18);
        background: rgba(255,255,255,0.05);
        transform: translateY(-1px);
    }
    .skill-pill.active {
        color: #fff;
        border-color: rgba(99,102,241,0.5);
        background: rgba(99,102,241,0.12);
        box-shadow: 0 0 20px rgba(99,102,241,0.15);
    }
    .skill-pill--translate.active {
        color: #34d399;
        border-color: rgba(16,185,129,0.45);
        background: rgba(16,185,129,0.1);
        box-shadow: 0 0 20px rgba(16,185,129,0.12);
    }
    .skill-pill--livestream.active {
        color: #fb923c;
        border-color: rgba(249,115,22,0.45);
        background: rgba(249,115,22,0.1);
        box-shadow: 0 0 20px rgba(249,115,22,0.12);
    }
    .skill-pill--generate.active {
        color: #c084fc;
        border-color: rgba(168,85,247,0.45);
        background: rgba(168,85,247,0.1);
        box-shadow: 0 0 20px rgba(168,85,247,0.12);
    }
    .skill-pill .skill-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: currentColor;
        opacity: 0.6;
    }
    .skill-pill.active .skill-dot {
        opacity: 1;
        animation: skillDotPulse 2s ease-in-out infinite;
    }
    @keyframes skillDotPulse {
        0%, 100% { box-shadow: 0 0 0 0 currentColor; }
        50% { box-shadow: 0 0 0 4px transparent; }
    }
    .skill-pill .skill-badge {
        font-size: 0.58rem;
        font-weight: 700;
        padding: 1px 6px;
        border-radius: 4px;
        background: rgba(16,185,129,0.15);
        color: #34d399;
        margin-left: 2px;
    }

    /* ---- 统一输入框 ---- */
    .create-input-wrap {
        margin-bottom: 24px;
    }
    .create-input-box {
        background: rgba(255,255,255,0.025);
        border: 2px solid rgba(255,255,255,0.08);
        border-radius: 18px;
        transition: all 0.3s;
        overflow: hidden;
    }
    .create-input-box:focus-within {
        border-color: rgba(99,102,241,0.35);
        box-shadow: 0 0 0 4px rgba(99,102,241,0.06), 0 0 40px rgba(99,102,241,0.05);
    }
    .create-input-box.skill-translate:focus-within {
        border-color: rgba(16,185,129,0.35);
        box-shadow: 0 0 0 4px rgba(16,185,129,0.06), 0 0 40px rgba(16,185,129,0.05);
    }
    .create-input-box.skill-livestream:focus-within {
        border-color: rgba(249,115,22,0.35);
        box-shadow: 0 0 0 4px rgba(249,115,22,0.06), 0 0 40px rgba(249,115,22,0.05);
    }
    .create-input-box.skill-generate:focus-within {
        border-color: rgba(168,85,247,0.35);
        box-shadow: 0 0 0 4px rgba(168,85,247,0.06), 0 0 40px rgba(168,85,247,0.05);
    }
    .create-input-textarea {
        width: 100%;
        min-height: 88px;
        max-height: 180px;
        padding: 16px 18px 6px;
        background: transparent;
        border: none;
        color: var(--text-primary);
        font-size: 0.92rem;
        font-family: inherit;
        outline: none;
        resize: none;
        line-height: 1.7;
    }
    .create-input-textarea::placeholder { color: var(--text-faint); }

    /* Toolbar 底栏 */
    .create-input-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 6px 14px 10px;
    }
    .create-input-left {
        display: flex;
        align-items: center;
        gap: 6px;
    }
    .create-input-icon-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 32px;
        height: 32px;
        border-radius: 8px;
        border: none;
        background: rgba(255,255,255,0.04);
        color: var(--text-faint);
        cursor: pointer;
        transition: all 0.2s;
        font-family: inherit;
    }
    .create-input-icon-btn:hover {
        color: var(--text-secondary);
        background: rgba(255,255,255,0.08);
    }
    .create-char-count {
        font-size: 0.68rem;
        color: var(--text-faint);
        font-family: 'JetBrains Mono', monospace;
        margin-left: 4px;
    }
    .create-submit-btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 9px 22px;
        font-size: 0.82rem;
        font-weight: 700;
        color: #fff;
        background: linear-gradient(135deg, #a855f7, #6366f1);
        border: none;
        border-radius: 12px;
        cursor: pointer;
        font-family: inherit;
        box-shadow: 0 0 24px rgba(99,102,241,0.25);
        transition: all 0.2s;
        position: relative;
        overflow: hidden;
    }
    .create-submit-btn:hover { transform: translateY(-1px); box-shadow: 0 0 40px rgba(99,102,241,0.35); }
    .create-submit-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; box-shadow: none !important; }
    .create-submit-btn::before {
        content: '';
        position: absolute; top: -50%; left: -50%;
        width: 200%; height: 200%;
        background: conic-gradient(from 0deg, transparent, rgba(255,255,255,0.1), transparent 30%);
        animation: shimmer 3s linear infinite;
    }
    @keyframes shimmer {
        to { transform: rotate(360deg); }
    }

    /* ---- 快捷提示词 chips ---- */
    .create-prompts-wrap {
        margin-bottom: 20px;
    }
    .create-prompts-label {
        font-size: 0.72rem;
        font-weight: 600;
        color: var(--text-faint);
        margin-bottom: 10px;
    }
    .create-prompts-chips {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: center;
    }
    .create-prompt-chip {
        padding: 7px 16px;
        font-size: 0.78rem;
        font-weight: 500;
        color: var(--text-secondary);
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 100px;
        cursor: pointer;
        transition: all 0.25s;
        display: flex;
        align-items: center;
        gap: 6px;
        font-family: inherit;
    }
    .create-prompt-chip:hover {
        color: var(--text-primary);
        border-color: rgba(99,102,241,0.35);
        background: rgba(99,102,241,0.06);
        transform: translateY(-2px);
    }
    .create-prompt-chip .chip-arrow {
        opacity: 0;
        transform: translateX(-4px);
        transition: all 0.25s;
        font-size: 0.7rem;
    }
    .create-prompt-chip:hover .chip-arrow {
        opacity: 0.7;
        transform: translateX(0);
    }

    /* ---- 默认配置折叠面板 ---- */
    .create-config-toggle {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 16px;
        font-size: 0.72rem;
        font-weight: 500;
        color: var(--text-faint);
        background: none;
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 100px;
        cursor: pointer;
        transition: all 0.2s;
        font-family: inherit;
        margin-bottom: 12px;
    }
    .create-config-toggle:hover {
        color: var(--text-muted);
        border-color: rgba(255,255,255,0.12);
    }
    .create-config-toggle svg {
        transition: transform 0.3s;
    }
    .create-config-toggle.open svg {
        transform: rotate(180deg);
    }

    .create-config-panel {
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s;
        opacity: 0;
    }
    .create-config-panel.open {
        max-height: 300px;
        opacity: 1;
    }
    .create-config-inner {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        max-width: 600px;
        margin: 0 auto;
        padding: 16px 0;
    }
    .create-config-item {
        display: flex;
        flex-direction: column;
        gap: 5px;
        text-align: left;
    }
    .create-config-item label {
        font-size: 0.65rem;
        font-weight: 600;
        color: var(--text-faint);
        text-transform: uppercase;
        letter-spacing: 0.04em;
    }
    .create-config-item select {
        padding: 7px 10px;
        font-size: 0.78rem;
        font-weight: 500;
        color: var(--text-secondary);
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 10px;
        outline: none;
        appearance: none;
        font-family: inherit;
        cursor: pointer;
        transition: all 0.2s;
        background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%23636e82' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
        background-repeat: no-repeat;
        background-position: right 10px center;
        padding-right: 28px;
    }
    .create-config-item select:hover {
        border-color: rgba(255,255,255,0.15);
    }
    .create-config-item select:focus {
        border-color: rgba(99,102,241,0.4);
        box-shadow: 0 0 0 3px rgba(99,102,241,0.06);
    }
    .create-config-item select option {
        background: #0f0f1a;
        color: #e2e8f0;
    }

    /* ---- 底部能力标签 ---- */
    .create-caps {
        display: flex;
        gap: 20px;
        justify-content: center;
        margin-top: 20px;
    }
    .create-cap {
        display: flex;
        align-items: center;
        gap: 5px;
        font-size: 0.7rem;
        color: var(--text-faint);
    }
    .create-cap-dot {
        width: 4px; height: 4px;
        border-radius: 50%;
        background: rgba(99,102,241,0.4);
    }

    /* ---- 响应式 ---- */
    @media (max-width: 720px) {
        .create-home-inner { max-width: 100%; }
        .create-hero h1 { font-size: 1.5rem; }
        .skill-selector { gap: 6px; }
        .skill-pill { padding: 7px 14px; font-size: 0.75rem; }
        .create-config-inner { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 480px) {
        .create-config-inner { grid-template-columns: 1fr; }
        .create-caps { flex-wrap: wrap; gap: 12px; }
    }

    /* ===== 用户下拉菜单 ===== */
    .icon-nav-avatar { position: relative; }
    .user-dropdown {
        position: absolute;
        bottom: 0;
        left: calc(100% + 10px);
        width: 200px;
        background: rgba(15,15,26,0.95);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 12px;
        padding: 8px;
        box-shadow: 0 12px 40px rgba(0,0,0,0.4), 0 0 30px rgba(99,102,241,0.06);
        opacity: 0;
        visibility: hidden;
        transform: translateY(6px);
        transition: all 0.2s cubic-bezier(.4,0,.2,1);
        z-index: 200;
    }
    .user-dropdown.show {
        opacity: 1;
        visibility: visible;
        transform: translateY(0);
    }
    .user-dropdown-header {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 8px 10px;
    }
    .user-dropdown-avatar {
        width: 32px; height: 32px;
        border-radius: 8px;
        background: linear-gradient(135deg, #a855f7, #6366f1, #3b82f6, #06b6d4);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.75rem;
        font-weight: 700;
        color: #fff;
        flex-shrink: 0;
    }
    .user-dropdown-info { min-width: 0; }
    .user-dropdown-name {
        font-size: 0.78rem;
        font-weight: 600;
        color: var(--text-primary);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }
    .user-dropdown-hint {
        font-size: 0.65rem;
        color: var(--text-faint);
    }
    .user-dropdown-divider {
        height: 1px;
        background: rgba(255,255,255,0.06);
        margin: 4px 0;
    }
    .user-dropdown-item {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 10px;
        font-size: 0.75rem;
        font-weight: 500;
        color: var(--text-muted);
        border-radius: 8px;
        text-decoration: none;
        transition: all 0.15s ease;
        cursor: pointer;
    }
    .user-dropdown-item:hover {
        color: var(--text-primary);
        background: rgba(255,255,255,0.05);
    }
    .user-dropdown-logout:hover {
        color: #ef4444;
        background: rgba(239,68,68,0.08);
    }
    </style>
</head>

    <!-- ===== 默认首页视图 ===== -->
    <main class="creator-main" id="homeView">
        <div class="create-home">
            <div class="create-home-inner">

                <!-- Hero 标题 -->
                <div class="create-hero">
                    <h1>你想创作<span class="gradient-text">什么？</span></h1>
                    <p>描述你的需求，AI 帮你完成视频创作全流程</p>
                </div>

                <!-- Skill 选择器 -->
                <div class="skill-selector" id="skillSelector">
                    <button class="skill-pill skill-pill--translate active" data-skill="translate">
                        <span class="skill-dot"></span>
                        🌐 视频译制
                        <span class="skill-badge">热门</span>
                    </button>
                    <button class="skill-pill skill-pill--livestream" data-skill="livestream">
                        <span class="skill-dot"></span>
                        🔴 直播剪辑
                    </button>
                    <button class="skill-pill skill-pill--generate" data-skill="generate">
                        <span class="skill-dot"></span>
                        ✨ AI 生成
                    </button>
                </div>

                <!-- 统一输入框 -->
                <div class="create-input-wrap">
                    <div class="create-input-box skill-translate" id="createInputBox">
                        <textarea class="create-input-textarea" id="createInput" placeholder="上传一段视频，翻译成英语..."></textarea>
                        <div class="create-input-toolbar">
                            <div class="create-input-left">
                                <button class="create-input-icon-btn" id="uploadBtn" title="上传文件">
                                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 10V3M8 3L11 6M8 3L5 6" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/><path d="M2 10V12C2 12.5523 2.44772 13 3 13H13C13.5523 13 14 12.5523 14 12V10" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
                                </button>
                                <button class="create-input-icon-btn" id="linkBtn" title="粘贴链接">
                                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6.5 9.5L9.5 6.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><path d="M9 10.5L10.5 9C11.6046 7.89543 11.6046 6.10457 10.5 5L11 4.5C12.3807 5.88071 12.3807 8.11929 11 9.5L9.5 11C8.11929 12.3807 5.88071 12.3807 4.5 11L5 10.5C6.10457 11.6046 7.89543 11.6046 9 10.5Z" fill="currentColor" opacity="0.5"/><path d="M7 5.5L5.5 7C4.39543 8.10457 4.39543 9.89543 5.5 11L5 11.5C3.61929 10.1193 3.61929 7.88071 5 6.5L6.5 5C7.88071 3.61929 10.1193 3.61929 11.5 5L11 5.5C9.89543 4.39543 8.10457 4.39543 7 5.5Z" fill="currentColor" opacity="0.5"/></svg>
                                </button>
                                <span class="create-char-count"><span id="createCharCount">0</span> 字</span>
                            </div>
                            <button class="create-submit-btn" id="createSubmitBtn">
                                <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 8H13M13 8L9 4M13 8L9 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                                开始
                            </button>
                        </div>
                    </div>
                </div>

                <!-- 快捷提示词 -->
                <div class="create-prompts-wrap" id="promptsWrap">
                    <div class="create-prompts-label">快捷指令</div>
                    <div class="create-prompts-chips" id="promptsChips">
                        <!-- 动态填充 -->
                    </div>
                </div>

                <!-- 默认配置折叠 -->
                <button class="create-config-toggle" id="configToggle">
                    <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M3 5L6 8L9 5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    高级配置
                </button>
                <div class="create-config-panel" id="configPanel">
                    <div class="create-config-inner" id="configInner">
                        <!-- 动态根据 skill 填充 -->
                    </div>
                </div>

                <!-- 能力标签 -->
                <div class="create-caps" id="createCaps">
                    <span class="create-cap"><span class="create-cap-dot"></span> 口型同步</span>
                    <span class="create-cap"><span class="create-cap-dot"></span> AI 配音</span>
                    <span class="create-cap"><span class="create-cap-dot"></span> 30+ 语种</span>
                    <span class="create-cap"><span class="create-cap-dot"></span> 字幕生成</span>
                </div>

            </div>
        </div>
    </main>

    <script src="app.js"></script>
    <script>
    (function() {
        // ===== Skill 定义 =====
        const skills = {
            translate: {
                name: '视频译制',
                url: 'translate-v6.html',
                inputClass: 'skill-translate',
                placeholder: '上传一段视频，翻译成英语...',
                prompts: [
                    { icon: '🌐', text: '把我的视频翻译成英文', params: { lang: 'en' } },
                    { icon: '🇯🇵', text: '翻译成日语，保留原声字幕', params: { lang: 'ja', keepOriginal: true } },
                    { icon: '📦', text: '批量翻译视频到多个语种', params: { batch: true } },
                    { icon: '🎙️', text: '只替换配音，不加字幕', params: { noSub: true } }
                ],
                config: [
                    { key: 'targetLang', label: '目标语言', options: [
                        { value: 'en', text: '英语' }, { value: 'ja', text: '日语' },
                        { value: 'ko', text: '韩语' }, { value: 'es', text: '西班牙语' },
                        { value: 'fr', text: '法语' }, { value: 'de', text: '德语' },
                        { value: 'pt', text: '葡萄牙语' }, { value: 'ar', text: '阿拉伯语' },
                        { value: 'ru', text: '俄语' }, { value: 'th', text: '泰语' }
                    ]},
                    { key: 'voiceStyle', label: '配音音色', options: [
                        { value: 'auto', text: '自动匹配' }, { value: 'female', text: '自然女声' },
                        { value: 'male', text: '自然男声' }, { value: 'clone', text: '声音克隆' }
                    ]},
                    { key: 'subtitle', label: '字幕样式', options: [
                        { value: 'bottom', text: '底部居中' }, { value: 'bilingual', text: '中英双语' },
                        { value: 'none', text: '不加字幕' }
                    ]},
                    { key: 'lipSync', label: '口型同步', options: [
                        { value: 'on', text: '开启' }, { value: 'off', text: '关闭' }
                    ]},
                    { key: 'quality', label: '输出画质', options: [
                        { value: '720', text: '720p' }, { value: '1080', text: '1080p' },
                        { value: '4k', text: '4K' }
                    ]},
                    { key: 'speed', label: '处理速度', options: [
                        { value: 'fast', text: '极速' }, { value: 'standard', text: '标准' },
                        { value: 'quality', text: '质量优先' }
                    ]}
                ],
                caps: [
                    '口型同步', 'AI 配音', '30+ 语种', '字幕生成'
                ]
            },
            livestream: {
                name: '直播剪辑',
                url: 'livestream.html',
                inputClass: 'skill-livestream',
                placeholder: '粘贴直播链接，或描述你想要的剪辑方式...',
                prompts: [
                    { icon: '🔴', text: '监控抖音直播，自动剪辑精彩片段', params: { platform: 'douyin' } },
                    { icon: '✂️', text: '把直播录像剪成 3 分钟短视频', params: { duration: 180 } },
                    { icon: '🛍️', text: '提取直播中的商品讲解片段', params: { mode: 'product' } },
                    { icon: '🏆', text: '自动识别游戏直播高光时刻', params: { mode: 'highlight' } }
                ],
                config: [
                    { key: 'platform', label: '直播平台', options: [
                        { value: 'douyin', text: '抖音' }, { value: 'kuaishou', text: '快手' },
                        { value: 'bilibili', text: 'B站' }, { value: 'taobao', text: '淘宝直播' },
                        { value: 'other', text: '其他' }
                    ]},
                    { key: 'clipDuration', label: '片段时长', options: [
                        { value: '30', text: '30秒' }, { value: '60', text: '1分钟' },
                        { value: '180', text: '3分钟' }, { value: '300', text: '5分钟' }
                    ]},
                    { key: 'clipCount', label: '片段数量', options: [
                        { value: '3', text: '3 个' }, { value: '5', text: '5 个' },
                        { value: '10', text: '10 个' }, { value: 'auto', text: '自动' }
                    ]},
                    { key: 'ratio', label: '输出比例', options: [
                        { value: '9:16', text: '9:16 竖屏' }, { value: '16:9', text: '16:9 横屏' },
                        { value: '1:1', text: '1:1 方形' }
                    ]},
                    { key: 'quality', label: '输出画质', options: [
                        { value: '720', text: '720p' }, { value: '1080', text: '1080p' }
                    ]},
                    { key: 'addCaption', label: '自动加字幕', options: [
                        { value: 'on', text: '开启' }, { value: 'off', text: '关闭' }
                    ]}
                ],
                caps: [
                    '实时监控', 'AI 识别', '多平台', '快速出片'
                ]
            },
            generate: {
                name: 'AI 生成',
                url: 'generate.html',
                inputClass: 'skill-generate',
                placeholder: '描述你想生成的视频，或上传参考图片...',
                prompts: [
                    { icon: '📦', text: '用产品图生成 15 秒广告视频', params: { mode: 'product' } },
                    { icon: '🎬', text: '写一个温暖的咖啡店故事短片', params: { mode: 'story' } },
                    { icon: '📱', text: '把这段文案变成竖屏短视频', params: { ratio: '9:16' } },
                    { icon: '✈️', text: '生成一段旅行 Vlog 风格视频', params: { style: 'vlog' } }
                ],
                config: [
                    { key: 'style', label: '视频风格', options: [
                        { value: 'cinematic', text: '电影感' }, { value: 'realistic', text: '写实' },
                        { value: 'anime', text: '动画' }, { value: 'cyber', text: '赛博朋克' },
                        { value: 'watercolor', text: '水彩画' }, { value: '3d', text: '3D 渲染' }
                    ]},
                    { key: 'ratio', label: '画面比例', options: [
                        { value: '16:9', text: '16:9 横屏' }, { value: '9:16', text: '9:16 竖屏' },
                        { value: '1:1', text: '1:1 方形' }
                    ]},
                    { key: 'duration', label: '视频时长', options: [
                        { value: '15', text: '15秒' }, { value: '30', text: '30秒' },
                        { value: '60', text: '1分钟' }, { value: '180', text: '3分钟' }
                    ]},
                    { key: 'quality', label: '输出画质', options: [
                        { value: '720', text: '720p' }, { value: '1080', text: '1080p' },
                        { value: '4k', text: '4K' }
                    ]},
                    { key: 'bgm', label: '背景音乐', options: [
                        { value: 'auto', text: '自动配乐' }, { value: 'none', text: '无' },
                        { value: 'upbeat', text: '轻快' }, { value: 'cinematic', text: '大气' }
                    ]},
                    { key: 'voice', label: '旁白配音', options: [
                        { value: 'none', text: '无旁白' }, { value: 'female', text: '女声旁白' },
                        { value: 'male', text: '男声旁白' }
                    ]}
                ],
                caps: [
                    '4K 超清', '自动配乐', 'AI 声音克隆', '3 分钟出片'
                ]
            }
        };

        let currentSkill = 'translate';

        // ===== DOM =====
        const inputBox = document.getElementById('createInputBox');
        const inputEl = document.getElementById('createInput');
        const charCount = document.getElementById('createCharCount');
        const promptsChips = document.getElementById('promptsChips');
        const configInner = document.getElementById('configInner');
        const capsEl = document.getElementById('createCaps');
        const configToggle = document.getElementById('configToggle');
        const configPanel = document.getElementById('configPanel');

        // ===== 字符计数 =====
        inputEl.addEventListener('input', function() {
            charCount.textContent = this.value.length;
        });

        // ===== Skill 切换 =====
        document.querySelectorAll('.skill-pill').forEach(function(pill) {
            pill.addEventListener('click', function() {
                var sk = this.dataset.skill;
                if (sk === currentSkill) return;
                document.querySelectorAll('.skill-pill').forEach(function(p) { p.classList.remove('active'); });
                this.classList.add('active');
                currentSkill = sk;
                renderSkill(sk);
            });
        });

        function renderSkill(sk) {
            var skill = skills[sk];
            // 输入框样式
            inputBox.className = 'create-input-box ' + skill.inputClass;
            inputEl.placeholder = skill.placeholder;
            inputEl.value = '';
            charCount.textContent = '0';
            // 提示词
            renderPrompts(skill.prompts);
            // 配置
            renderConfig(skill.config);
            // 能力标签
            renderCaps(skill.caps);
        }

        function renderPrompts(prompts) {
            promptsChips.innerHTML = prompts.map(function(p) {
                return '<button class="create-prompt-chip" data-text="' + escHTML(p.text) + '">' + 
                    p.icon + ' ' + escHTML(p.text) + 
                    '<span class="chip-arrow">→</span></button>';
            }).join('');
            // 绑定点击
            promptsChips.querySelectorAll('.create-prompt-chip').forEach(function(chip) {
                chip.addEventListener('click', function() {
                    inputEl.value = this.dataset.text;
                    charCount.textContent = inputEl.value.length;
                    inputEl.focus();
                    // 添加点击反馈动画
                    this.style.transform = 'scale(0.95)';
                    setTimeout(function() { chip.style.transform = ''; }, 150);
                });
            });
        }

        function renderConfig(config) {
            configInner.innerHTML = config.map(function(c) {
                var opts = c.options.map(function(o) {
                    return '<option value="' + o.value + '">' + o.text + '</option>';
                }).join('');
                return '<div class="create-config-item"><label>' + c.label + '</label><select data-key="' + c.key + '">' + opts + '</select></div>';
            }).join('');
        }

        function renderCaps(caps) {
            capsEl.innerHTML = caps.map(function(c) {
                return '<span class="create-cap"><span class="create-cap-dot"></span> ' + c + '</span>';
            }).join('');
        }

        function escHTML(str) {
            var div = document.createElement('div');
            div.appendChild(document.createTextNode(str));
            return div.innerHTML;
        }

        // ===== 配置面板折叠 =====
        configToggle.addEventListener('click', function() {
            this.classList.toggle('open');
            configPanel.classList.toggle('open');
        });

        // ===== 意图识别 + 路由跳转 =====
        document.getElementById('createSubmitBtn').addEventListener('click', handleSubmit);
        inputEl.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSubmit();
            }
        });

        function handleSubmit() {
            var text = inputEl.value.trim();
            // 没有输入也允许跳转（可以直接去功能页）
            var skill = skills[currentSkill];
            // 尝试意图识别
            var detectedSkill = detectIntent(text);
            if (detectedSkill && detectedSkill !== currentSkill) {
                // 用户输入和当前选中的 Skill 不一致，切换到识别到的
                currentSkill = detectedSkill;
                skill = skills[detectedSkill];
                document.querySelectorAll('.skill-pill').forEach(function(p) { p.classList.remove('active'); });
                document.querySelector('[data-skill="' + detectedSkill + '"]').classList.add('active');
                renderSkill(detectedSkill);
            }

            // 构建跳转 URL
            var url = skill.url;
            var params = [];
            if (text) params.push('prompt=' + encodeURIComponent(text));
            // 收集配置
            configInner.querySelectorAll('select').forEach(function(sel) {
                params.push(sel.dataset.key + '=' + encodeURIComponent(sel.value));
            });
            if (params.length) url += '?' + params.join('&');

            // 跳转
            window.location.href = url;
        }

        // ===== 简易意图识别 =====
        function detectIntent(text) {
            if (!text) return null;
            var t = text.toLowerCase();
            // 译制相关关键词
            var translateKw = ['翻译', '译制', '多语言', '配音', '字幕', '本地化', '英文', '日文', '英语', '日语', '韩语', '法语', '德语', '西班牙语', 'translate', 'dub'];
            // 直播相关关键词
            var liveKw = ['直播', '监控', '剪辑', '录像', '高光', '精彩片段', '抖音', '快手', 'bilibili', 'b站', '带货', '商品讲解', 'livestream', 'live'];
            // 生成相关关键词
            var genKw = ['生成', '创作', '脚本', '广告', '故事', '产品图', 'vlog', '文案', '制作视频', '做一个视频', 'generate', 'create'];

            var scores = { translate: 0, livestream: 0, generate: 0 };
            translateKw.forEach(function(kw) { if (t.indexOf(kw) !== -1) scores.translate++; });
            liveKw.forEach(function(kw) { if (t.indexOf(kw) !== -1) scores.livestream++; });
            genKw.forEach(function(kw) { if (t.indexOf(kw) !== -1) scores.generate++; });

            var max = Math.max(scores.translate, scores.livestream, scores.generate);
            if (max === 0) return null;
            if (scores.translate === max) return 'translate';
            if (scores.livestream === max) return 'livestream';
            return 'generate';
        }

        // ===== 上传按钮（模拟） =====
        document.getElementById('uploadBtn').addEventListener('click', function() {
            var fileInput = document.createElement('input');
            fileInput.type = 'file';
            fileInput.accept = 'video/*,image/*';
            fileInput.onchange = function(e) {
                var file = e.target.files[0];
                if (file) {
                    inputEl.value = (inputEl.value ? inputEl.value + '\n' : '') + '📎 ' + file.name;
                    charCount.textContent = inputEl.value.length;
                }
            };
            fileInput.click();
        });

        // ===== 链接按钮 =====
        document.getElementById('linkBtn').addEventListener('click', function() {
            var url = prompt('请粘贴视频/直播链接：');
            if (url && url.trim()) {
                inputEl.value = (inputEl.value ? inputEl.value + '\n' : '') + '🔗 ' + url.trim();
                charCount.textContent = inputEl.value.length;
            }
        });

        // ===== 初始渲染 =====
        renderSkill(currentSkill);

    })();
    </script>
    <script>
    (function() {
        var avatar = document.getElementById('userAvatar');
        var avatarLetter = document.getElementById('userAvatarLetter');
        var dropdown = document.getElementById('userDropdown');
        var dropdownAvatar = document.getElementById('dropdownAvatar');
        var dropdownName = document.getElementById('dropdownName');
        var dropdownHint = document.getElementById('dropdownHint');
        var loginBtn = document.getElementById('userLoginBtn');
        var logoutBtn = document.getElementById('userLogoutBtn');

        function updateUserUI() {
            var raw = localStorage.getItem('tideo_user');
            if (raw) {
                try {
                    var user = JSON.parse(raw);
                    var initial = user.avatar || user.name.charAt(0).toUpperCase();
                    avatarLetter.textContent = initial;
                    dropdownAvatar.textContent = initial;
                    dropdownName.textContent = user.name;
                    dropdownHint.textContent = '已登录';
                    loginBtn.style.display = 'none';
                    logoutBtn.style.display = 'flex';
                    avatar.title = user.name;
                } catch(e) {}
            } else {
                avatarLetter.textContent = 'U';
                dropdownAvatar.textContent = 'U';
                dropdownName.textContent = '未登录';
                dropdownHint.textContent = '点击登录';
                loginBtn.style.display = 'flex';
                logoutBtn.style.display = 'none';
                avatar.title = '用户';
            }
        }

        // 点击头像切换下拉
        avatar.addEventListener('click', function(e) {
            e.stopPropagation();
            dropdown.classList.toggle('show');
        });

        // 点击外部关闭
        document.addEventListener('click', function(e) {
            if (!dropdown.contains(e.target) && e.target !== avatar) {
                dropdown.classList.remove('show');
            }
        });

        // 登录按钮
        loginBtn.addEventListener('click', function(e) {
            e.preventDefault();
            window.location.href = 'login.html';
        });

        // 退出登录
        logoutBtn.addEventListener('click', function(e) {
            e.preventDefault();
            localStorage.removeItem('tideo_user');
            updateUserUI();
            dropdown.classList.remove('show');
        });

        // 初始化
        updateUserUI();

        // 监听 storage 变化（跨标签页同步）
        window.addEventListener('storage', function(e) {
            if (e.key === 'tideo_user') updateUserUI();
        });
    })();
    </script>
