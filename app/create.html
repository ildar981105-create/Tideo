<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>创作 — Tideo</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
    /* ===== create.html — 高级暗色风格主页 ===== */

    .create-home {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 40px 32px 32px;
        overflow-y: auto;
        position: relative;
    }
    .create-home::-webkit-scrollbar { width: 4px; }
    .create-home::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 2px; }

    /* === 背景氛围光球 === */
    .create-home::before {
        content: '';
        position: fixed;
        top: -10%;
        left: 50%;
        transform: translateX(-50%);
        width: 900px;
        height: 600px;
        background:
            radial-gradient(ellipse 60% 55% at 30% 40%, rgba(124, 58, 237, 0.12) 0%, transparent 60%),
            radial-gradient(ellipse 50% 45% at 70% 30%, rgba(99, 102, 241, 0.10) 0%, transparent 55%),
            radial-gradient(ellipse 45% 40% at 50% 60%, rgba(6, 182, 212, 0.06) 0%, transparent 50%);
        pointer-events: none;
        z-index: 0;
        animation: ambientDrift 12s ease-in-out infinite alternate;
    }
    .create-home::after {
        content: '';
        position: fixed;
        bottom: -5%;
        left: 50%;
        transform: translateX(-50%);
        width: 800px;
        height: 500px;
        background:
            radial-gradient(ellipse 55% 50% at 60% 50%, rgba(168, 85, 247, 0.07) 0%, transparent 55%),
            radial-gradient(ellipse 40% 35% at 25% 60%, rgba(16, 185, 129, 0.05) 0%, transparent 50%);
        pointer-events: none;
        z-index: 0;
        animation: ambientDrift2 15s ease-in-out infinite alternate;
    }
    @keyframes ambientDrift {
        0%   { opacity: 0.6; transform: translateX(-50%) translateY(0) scale(1); }
        100% { opacity: 1; transform: translateX(-48%) translateY(-15px) scale(1.06); }
    }
    @keyframes ambientDrift2 {
        0%   { opacity: 0.5; transform: translateX(-50%) scale(1); }
        100% { opacity: 0.85; transform: translateX(-52%) translateY(10px) scale(1.04); }
    }

    .create-home-inner {
        max-width: 820px;
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0;
        position: relative;
        z-index: 1;
    }

    /* ---- Hero 区域 ---- */
    .hero-section {
        text-align: center;
        margin-bottom: 48px;
        position: relative;
    }
    .hero-icon {
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 18px;
        width: 56px;
        height: 56px;
        border-radius: 16px;
        background: rgba(124,58,237,0.08);
        border: 1px solid rgba(124,58,237,0.12);
        position: relative;
    }
    .hero-icon::after {
        content: '';
        position: absolute;
        inset: -8px;
        border-radius: 22px;
        background: radial-gradient(circle, rgba(124,58,237,0.08) 0%, transparent 70%);
        animation: heroGlow 3s ease-in-out infinite alternate;
    }
    @keyframes heroGlow {
        0% { opacity: 0.4; transform: scale(1); }
        100% { opacity: 0.8; transform: scale(1.15); }
    }
    .hero-subtitle {
        font-size: 0.82rem;
        color: rgba(148, 163, 184, 0.6);
        margin-bottom: 8px;
        font-weight: 500;
        letter-spacing: 0.02em;
    }
    .hero-title {
        font-size: 2.4rem;
        font-weight: 800;
        color: var(--text-primary);
        line-height: 1.25;
        letter-spacing: -0.03em;
    }
    .hero-title .gradient-word {
        background: linear-gradient(135deg, #c084fc 0%, #818cf8 40%, #22d3ee 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }

    /* ---- 三张大卡片 ---- */
    .skill-cards {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 24px;
        width: 100%;
        margin-bottom: 48px;
    }
    .skill-card-wrap {
        display: flex;
        flex-direction: column;
        gap: 14px;
        cursor: pointer;
    }
    .skill-card {
        position: relative;
        border-radius: 20px;
        overflow: hidden;
        aspect-ratio: 4 / 3;
        transition: all 0.4s cubic-bezier(.4,0,.2,1);
        border: 1px solid rgba(255,255,255,0.08);
        background: rgba(255,255,255,0.03);
        box-shadow: 0 4px 24px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.04);
    }
    /* 卡片图片 */
    .skill-card-img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        transition: transform 0.5s cubic-bezier(.4,0,.2,1), filter 0.5s;
        filter: brightness(0.85) saturate(1.1);
    }
    .skill-card-wrap:hover .skill-card-img {
        transform: scale(1.06);
        filter: brightness(1) saturate(1.2);
    }
    /* 图片上方的渐变遮罩（底部微弱） */
    .skill-card-overlay {
        position: absolute;
        inset: 0;
        background: linear-gradient(to top, rgba(8,8,14,0.5) 0%, rgba(8,8,14,0.1) 30%, transparent 60%);
        pointer-events: none;
        z-index: 1;
    }
    /* 每张卡片的底部氛围光 — 默认微弱可见 */
    .skill-card::before {
        content: '';
        position: absolute;
        inset: 0;
        opacity: 0.5;
        transition: opacity 0.5s;
        pointer-events: none;
        z-index: 2;
    }
    .skill-card-wrap:hover .skill-card::before { opacity: 1; }
    .skill-card--translate::before {
        background: radial-gradient(ellipse 80% 60% at 50% 100%, rgba(16,185,129,0.12) 0%, transparent 65%);
    }
    .skill-card--livestream::before {
        background: radial-gradient(ellipse 80% 60% at 50% 100%, rgba(249,115,22,0.12) 0%, transparent 65%);
    }
    .skill-card--generate::before {
        background: radial-gradient(ellipse 80% 60% at 50% 100%, rgba(168,85,247,0.14) 0%, transparent 65%);
    }
    /* 每张卡片的顶部柔光 — 默认微弱可见 */
    .skill-card::after {
        content: '';
        position: absolute;
        top: -1px;
        left: 15%;
        right: 15%;
        height: 1px;
        opacity: 0.4;
        transition: opacity 0.4s;
        pointer-events: none;
        z-index: 3;
    }
    .skill-card-wrap:hover .skill-card::after { opacity: 1; }
    .skill-card--translate::after {
        background: linear-gradient(90deg, transparent, rgba(16,185,129,0.6), transparent);
    }
    .skill-card--livestream::after {
        background: linear-gradient(90deg, transparent, rgba(249,115,22,0.6), transparent);
    }
    .skill-card--generate::after {
        background: linear-gradient(90deg, transparent, rgba(168,85,247,0.6), transparent);
    }

    .skill-card-wrap:hover .skill-card {
        transform: translateY(-4px);
        border-color: rgba(255,255,255,0.12);
        box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    }
    .skill-card-wrap:hover .skill-card--translate {
        border-color: rgba(16,185,129,0.25);
        box-shadow: 0 20px 60px rgba(16,185,129,0.1), 0 0 80px rgba(16,185,129,0.05);
    }
    .skill-card-wrap:hover .skill-card--livestream {
        border-color: rgba(249,115,22,0.25);
        box-shadow: 0 20px 60px rgba(249,115,22,0.1), 0 0 80px rgba(249,115,22,0.05);
    }
    .skill-card-wrap:hover .skill-card--generate {
        border-color: rgba(168,85,247,0.25);
        box-shadow: 0 20px 60px rgba(168,85,247,0.12), 0 0 80px rgba(168,85,247,0.06);
    }

    /* 卡片外部文字信息 */
    .skill-card-info {
        padding: 0 4px;
    }
    .skill-card-label {
        font-size: 0.95rem;
        font-weight: 700;
        color: var(--text-primary);
        line-height: 1.35;
    }
    .skill-card-desc {
        font-size: 0.72rem;
        color: var(--text-muted);
        margin-top: 4px;
        line-height: 1.5;
    }
    .skill-card-action {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        font-size: 0.7rem;
        font-weight: 600;
        color: var(--text-faint);
        margin-top: 8px;
        transition: all 0.3s;
    }
    .skill-card-action svg {
        transition: transform 0.3s;
    }
    .skill-card-wrap:hover .skill-card-action {
        gap: 7px;
    }
    .skill-card-wrap:hover .skill-card-action svg {
        transform: translateX(2px);
    }
    .skill-card-wrap--translate:hover .skill-card-action {
        color: #34d399;
    }
    .skill-card-wrap--livestream:hover .skill-card-action {
        color: #fb923c;
    }
    .skill-card-wrap--generate:hover .skill-card-action {
        color: #c084fc;
    }

    /* ---- 输入区域（底部固定感） ---- */
    .input-section {
        width: 100%;
        position: relative;
    }

    /* Skill 浮出标签（输入框上方） */
    .skill-float {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 8px;
        margin-bottom: 8px;
        min-height: 28px;
        transition: all 0.3s;
    }
    .skill-float:empty { min-height: 0; margin-bottom: 0; }

    .skill-float-tag {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 4px 12px;
        font-size: 0.72rem;
        font-weight: 600;
        border-radius: 100px;
        animation: skillFloatIn 0.3s cubic-bezier(.4,0,.2,1);
        cursor: pointer;
        transition: all 0.2s;
        white-space: nowrap;
    }
    .skill-float-tag:hover {
        transform: translateY(-1px);
    }
    @keyframes skillFloatIn {
        0% { opacity: 0; transform: translateY(6px) scale(0.9); }
        100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    .skill-float-tag--translate {
        background: rgba(16,185,129,0.12);
        color: #34d399;
        border: 1px solid rgba(16,185,129,0.25);
    }
    .skill-float-tag--livestream {
        background: rgba(249,115,22,0.12);
        color: #fb923c;
        border: 1px solid rgba(249,115,22,0.25);
    }
    .skill-float-tag--generate {
        background: rgba(168,85,247,0.12);
        color: #c084fc;
        border: 1px solid rgba(168,85,247,0.25);
    }
    .skill-float-icon {
        font-size: 0.75rem;
    }
    .skill-float-arrow {
        font-size: 0.55rem;
        opacity: 0.5;
        margin-left: 2px;
    }

    /* 输入框容器 */
    .input-box {
        background: rgba(255,255,255,0.03);
        border: 1.5px solid rgba(255,255,255,0.08);
        border-radius: 18px;
        transition: all 0.35s;
        overflow: hidden;
        position: relative;
        box-shadow: 0 4px 32px rgba(0,0,0,0.2), 0 0 60px rgba(99,102,241,0.03), inset 0 1px 0 rgba(255,255,255,0.04);
    }
    .input-box::before {
        content: '';
        position: absolute;
        top: -1px;
        left: 15%;
        right: 15%;
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(99,102,241,0.3), transparent);
        opacity: 0;
        transition: opacity 0.4s;
        pointer-events: none;
        z-index: 2;
    }
    .input-box:focus-within::before { opacity: 1; }
    .input-box:focus-within {
        border-color: rgba(99,102,241,0.25);
        box-shadow: 0 0 0 4px rgba(99,102,241,0.04), 0 8px 40px rgba(99,102,241,0.06);
        background: rgba(255,255,255,0.035);
    }

    /* 附件标签 */
    .attach-bar {
        padding: 10px 16px 0;
    }
    .attach-bar:empty { display: none; }
    .attach-tag {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 5px 10px;
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 8px;
        font-size: 0.75rem;
        color: var(--text-secondary);
        max-width: 100%;
    }
    .attach-tag-icon { flex-shrink: 0; font-size: 0.8rem; }
    .attach-tag-name {
        font-weight: 500;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 220px;
    }
    .attach-tag-meta {
        font-size: 0.62rem;
        color: var(--text-faint);
        font-family: 'JetBrains Mono', monospace;
        flex-shrink: 0;
    }
    .attach-tag-remove {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 18px; height: 18px;
        border-radius: 4px;
        border: none;
        background: none;
        color: var(--text-faint);
        cursor: pointer;
        transition: all 0.15s;
        flex-shrink: 0;
        font-family: inherit;
    }
    .attach-tag-remove:hover {
        color: #ef4444;
        background: rgba(239,68,68,0.1);
    }
    .attach-tag-thumb {
        width: 22px; height: 22px;
        border-radius: 4px;
        object-fit: cover;
        flex-shrink: 0;
    }
    .attach-tag--link { border-color: rgba(249,115,22,0.2); }
    .attach-tag--link .attach-tag-name { color: #fb923c; font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; }
    .attach-platform {
        font-size: 0.58rem;
        font-weight: 700;
        padding: 1px 5px;
        border-radius: 3px;
        background: rgba(249,115,22,0.1);
        color: #fb923c;
        flex-shrink: 0;
    }

    /* Textarea */
    .input-textarea {
        width: 100%;
        min-height: 48px;
        max-height: 120px;
        padding: 14px 18px 6px;
        background: transparent;
        border: none;
        color: var(--text-primary);
        font-size: 0.9rem;
        font-family: inherit;
        outline: none;
        resize: none;
        line-height: 1.65;
    }
    .input-textarea::placeholder { color: var(--text-faint); }

    /* ---- 配置胶囊（Skill 识别后展示在 textarea 下方） ---- */
    .config-bar {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        padding: 0 16px 8px;
        animation: configSlideIn 0.35s cubic-bezier(.4,0,.2,1);
    }
    .config-bar:empty { display: none; }
    @keyframes configSlideIn {
        0% { opacity: 0; transform: translateY(-6px); }
        100% { opacity: 1; transform: translateY(0); }
    }
    .cfg-capsule {
        position: relative;
        display: inline-flex;
        align-items: center;
        gap: 3px;
        padding: 4px 10px;
        font-size: 0.68rem;
        font-weight: 500;
        color: var(--text-muted);
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(255,255,255,0.07);
        border-radius: 100px;
        cursor: pointer;
        transition: all 0.2s;
        font-family: inherit;
        user-select: none;
    }
    .cfg-capsule:hover {
        color: var(--text-primary);
        border-color: rgba(255,255,255,0.16);
        background: rgba(255,255,255,0.06);
    }
    .cfg-capsule.modified {
        border-color: rgba(99,102,241,0.3);
        color: var(--text-primary);
        background: rgba(99,102,241,0.06);
    }
    /* Skill 主色高亮 */
    .cfg-capsule.modified[data-theme="translate"] {
        border-color: rgba(16,185,129,0.3);
        background: rgba(16,185,129,0.06);
        color: #34d399;
    }
    .cfg-capsule.modified[data-theme="livestream"] {
        border-color: rgba(249,115,22,0.3);
        background: rgba(249,115,22,0.06);
        color: #fb923c;
    }
    .cfg-capsule.modified[data-theme="generate"] {
        border-color: rgba(168,85,247,0.3);
        background: rgba(168,85,247,0.06);
        color: #c084fc;
    }
    .cfg-value { font-weight: 600; }
    .cfg-arrow {
        font-size: 0.5rem;
        opacity: 0.45;
        transition: transform 0.2s;
    }
    .cfg-capsule.open .cfg-arrow { transform: rotate(180deg); }

    /* Capsule dropdown */
    .cfg-dropdown {
        position: absolute;
        top: calc(100% + 5px);
        left: 50%;
        transform: translateX(-50%);
        min-width: 100px;
        background: rgba(15,15,26,0.96);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 10px;
        padding: 4px;
        box-shadow: 0 8px 28px rgba(0,0,0,0.4);
        z-index: 100;
        opacity: 0;
        visibility: hidden;
        transition: all 0.2s cubic-bezier(.4,0,.2,1);
    }
    .cfg-dropdown.show {
        opacity: 1;
        visibility: visible;
        transform: translateX(-50%) translateY(0);
    }
    .cfg-drop-item {
        display: block;
        width: 100%;
        padding: 6px 10px;
        font-size: 0.68rem;
        font-weight: 500;
        color: var(--text-muted);
        background: none;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        transition: all 0.12s;
        text-align: left;
        white-space: nowrap;
        font-family: inherit;
    }
    .cfg-drop-item:hover {
        color: var(--text-primary);
        background: rgba(255,255,255,0.06);
    }
    .cfg-drop-item.selected {
        color: #a78bfa;
        background: rgba(99,102,241,0.08);
    }

    /* 底栏 */
    .input-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 4px 12px 8px;
    }
    .input-left {
        display: flex;
        align-items: center;
        gap: 4px;
    }
    .input-icon-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 32px;
        height: 32px;
        border-radius: 8px;
        border: none;
        background: transparent;
        color: var(--text-faint);
        cursor: pointer;
        transition: all 0.2s;
        font-family: inherit;
    }
    .input-icon-btn:hover {
        color: var(--text-secondary);
        background: rgba(255,255,255,0.06);
    }
    .input-submit-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        border-radius: 10px;
        border: none;
        background: linear-gradient(135deg, rgba(124,58,237,0.7), rgba(79,70,229,0.7));
        color: #fff;
        cursor: pointer;
        font-family: inherit;
        transition: all 0.3s cubic-bezier(.4,0,.2,1);
        position: relative;
        overflow: hidden;
    }
    .input-submit-btn:hover {
        background: linear-gradient(135deg, rgba(124,58,237,0.9), rgba(79,70,229,0.9));
        transform: translateY(-1px);
        box-shadow: 0 4px 20px rgba(124,58,237,0.3);
    }
    .input-submit-btn:disabled {
        opacity: 0.3;
        cursor: not-allowed;
        transform: none !important;
    }

    /* ---- 响应式 ---- */
    @media (max-width: 720px) {
        .create-home { padding: 24px 16px 20px; }
        .hero-title { font-size: 1.6rem; }
        .skill-cards { gap: 16px; }
        .skill-card { aspect-ratio: 3 / 2.5; }
        .input-section { max-width: 100%; }
    }
    @media (max-width: 520px) {
        .skill-cards {
            grid-template-columns: 1fr;
            gap: 20px;
        }
        .skill-card {
            aspect-ratio: 16 / 9;
        }
    }

    /* ===== 用户下拉菜单 ===== */
    .icon-nav-avatar { position: relative; }

    /* ===== 素材引导提示 ===== */
    .nudge-toast {
        position: absolute;
        bottom: calc(100% + 10px);
        left: 50%;
        transform: translateX(-50%) translateY(8px);
        padding: 10px 18px;
        border-radius: 14px;
        font-size: 0.78rem;
        font-weight: 500;
        color: #fff;
        white-space: nowrap;
        pointer-events: none;
        opacity: 0;
        transition: all 0.35s cubic-bezier(.4,0,.2,1);
        z-index: 50;
        display: flex;
        align-items: center;
        gap: 8px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    .nudge-toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
        pointer-events: auto;
    }
    .nudge-toast--translate {
        background: rgba(16,185,129,0.15);
        border: 1px solid rgba(16,185,129,0.3);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
    }
    .nudge-toast--livestream {
        background: rgba(249,115,22,0.15);
        border: 1px solid rgba(249,115,22,0.3);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
    }
    .nudge-toast-icon {
        font-size: 1rem;
        flex-shrink: 0;
    }
    .nudge-toast-text {
        color: rgba(255,255,255,0.9);
    }
    .nudge-toast-btn {
        padding: 4px 12px;
        border-radius: 8px;
        border: none;
        font-size: 0.72rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        font-family: inherit;
        flex-shrink: 0;
    }
    .nudge-toast--translate .nudge-toast-btn {
        background: rgba(16,185,129,0.25);
        color: #34d399;
    }
    .nudge-toast--translate .nudge-toast-btn:hover {
        background: rgba(16,185,129,0.4);
    }

                        { value: 'bilibili', text: 'B站' }, { value: 'taobao', text: '淘宝直播' },
                        { value: 'other', text: '其他' }
                    ]},
                    { key: 'clipDuration', label: '时长', options: [
                        { value: '30', text: '30秒' }, { value: '60', text: '1分钟' },
                        { value: '180', text: '3分钟' }, { value: '300', text: '5分钟' }
                    ]},
                    { key: 'clipCount', label: '数量', options: [
                        { value: '3', text: '3个' }, { value: '5', text: '5个' },
                        { value: '10', text: '10个' }, { value: 'auto', text: '自动' }
                    ]},
                    { key: 'ratio', label: '比例', options: [
                        { value: '9:16', text: '9:16竖屏' }, { value: '16:9', text: '16:9横屏' },
                        { value: '1:1', text: '1:1方形' }
                    ]},
                    { key: 'addCaption', label: '字幕', options: [
                        { value: 'on', text: '加字幕' }, { value: 'off', text: '不加' }
                    ]}
                ]
            },
            generate: {
                name: 'AI 生成',
                icon: '✨',
                url: 'generate.html',
                cssClass: 'generate',
                keywords: ['生成', '创作', '脚本', '广告', '故事', '产品图', 'vlog', '文案', '制作视频', '做一个视频', 'generate', 'create', '动画'],
                config: [
                    { key: 'style', label: '风格', options: [
                        { value: 'cinematic', text: '电影感' }, { value: 'realistic', text: '写实' },
                        { value: 'anime', text: '动画' }, { value: 'cyber', text: '赛博朋克' },
                        { value: 'watercolor', text: '水彩画' }, { value: '3d', text: '3D渲染' }
                    ]},
                    { key: 'ratio', label: '比例', options: [
                        { value: '16:9', text: '16:9横屏' }, { value: '9:16', text: '9:16竖屏' },
                        { value: '1:1', text: '1:1方形' }
                    ]},
                    { key: 'duration', label: '时长', options: [
                        { value: '15', text: '15秒' }, { value: '30', text: '30秒' },
                        { value: '60', text: '1分钟' }, { value: '180', text: '3分钟' }
                    ]},
                    { key: 'quality', label: '画质', options: [
                        { value: '720', text: '720p' }, { value: '1080', text: '1080p' },
                        { value: '4k', text: '4K' }
                    ]},
                    { key: 'bgm', label: '配乐', options: [
                        { value: 'auto', text: '自动配乐' }, { value: 'none', text: '无' },
                        { value: 'upbeat', text: '轻快' }, { value: 'cinematic', text: '大气' }
                    ]}
                ]
            }
        };

        var detectedSkill = null;
        var detectedSubMode = null; // translate 子功能: 'erase' | 'subtitle' | 'voice' | null
        var uploadedFile = null;
        var refImage = null;
        var liveLink = '';
        var configValues = {};

        // ===== DOM =====
        var inputEl = document.getElementById('mainInput');
        var skillFloat = document.getElementById('skillFloat');
        var configBar = document.getElementById('configBar');
        var attachBar = document.getElementById('attachBar');
        var submitBtn = document.getElementById('submitBtn');

        // ===== 卡片点击 → 直接跳转 =====
        document.querySelectorAll('.skill-card-wrap').forEach(function(card) {
            card.addEventListener('click', function() {
                var sk = this.dataset.skill;
                var text = inputEl.value.trim();
                var url = skills[sk].url;
                var params = [];
                if (text) params.push('prompt=' + encodeURIComponent(text));
                // 如果当前已识别到这个 skill，带上配置
                if (detectedSkill === sk) {
                    Object.keys(configValues).forEach(function(k) {
                        params.push(k + '=' + encodeURIComponent(configValues[k]));
                    });
                    // 带上子功能 mode
                    if (sk === 'translate' && detectedSubMode) {
                        params.push('mode=' + detectedSubMode);
                    }
                }
                if (params.length) url += '?' + params.join('&');
                window.location.href = url;
            });
        });

        // ===== 子功能识别 =====
        function detectTranslateSubMode(text) {
            var sub = skills.translate.subModes;
            var bestSub = null;
            var bestSubScore = 0;
            for (var i = 0; i < sub.length; i++) {
                var score = 0;
                for (var j = 0; j < sub[i].keywords.length; j++) {
                    if (text.indexOf(sub[i].keywords[j]) !== -1) score++;
                }
                if (score > bestSubScore) {
                    bestSubScore = score;
                    bestSub = sub[i];
                }
            }
            return bestSubScore > 0 ? bestSub : null;
        }

        // ===== 实时意图识别 =====
        var lastDetected = null;
        var lastSubMode = null;

        inputEl.addEventListener('input', function() {
            var text = this.value.toLowerCase();
            if (!text.trim()) {
                detectedSkill = null;
                detectedSubMode = null;
                lastDetected = null;
                lastSubMode = null;
                skillFloat.innerHTML = '';
                configBar.innerHTML = '';
                configValues = {};
                return;
            }

            var scores = {};
            Object.keys(skills).forEach(function(key) {
                scores[key] = 0;
                skills[key].keywords.forEach(function(kw) {
                    if (text.indexOf(kw) !== -1) scores[key]++;
                });
                // 子功能关键词也计入 translate 总分
                if (key === 'translate' && skills[key].subModes) {
                    skills[key].subModes.forEach(function(sub) {
                        sub.keywords.forEach(function(kw) {
                            if (text.indexOf(kw) !== -1) scores[key]++;
                        });
                    });
                }
            });

            var best = null;
            var bestScore = 0;
            Object.keys(scores).forEach(function(key) {
                if (scores[key] > bestScore) {
                    bestScore = scores[key];
                    best = key;
                }
            });

            // 检测 translate 子功能
            var subMode = null;
            if (best === 'translate') {
                var sub = detectTranslateSubMode(text);
                subMode = sub ? sub.mode : null;
            }

            var changed = (best !== lastDetected) || (best === 'translate' && subMode !== lastSubMode);

            if (bestScore > 0 && changed) {
                detectedSkill = best;
                detectedSubMode = subMode;
                lastDetected = best;
                lastSubMode = subMode;
                var s = skills[best];

                // 构建浮出标签
                var floatHTML = '';
                if (best === 'translate' && subMode) {
                    // 找到子功能定义
                    var subDef = null;
                    for (var i = 0; i < s.subModes.length; i++) {
                        if (s.subModes[i].mode === subMode) { subDef = s.subModes[i]; break; }
                    }
                    // 显示: [视频译制] [→ 擦除字幕]
                    floatHTML =
                        '<div class="skill-float-tag skill-float-tag--translate" data-skill="translate" data-mode="">' +
                            '<span class="skill-float-icon">' + s.icon + '</span>' +
                            s.name +
                            '<span class="skill-float-arrow">↗</span>' +
                        '</div>' +
                        '<div class="skill-float-tag skill-float-tag--translate" data-skill="translate" data-mode="' + subMode + '" style="background:rgba(16,185,129,0.18);border-color:rgba(16,185,129,0.35);">' +
                            '<span class="skill-float-icon">' + (subDef ? subDef.icon : '') + '</span>' +
                            (subDef ? subDef.name : '') +
                            '<span class="skill-float-arrow">↗</span>' +
                        '</div>';
                } else {
                    floatHTML =
                        '<div class="skill-float-tag skill-float-tag--' + s.cssClass + '" data-skill="' + best + '">' +
                            '<span class="skill-float-icon">' + s.icon + '</span>' +
                            s.name +
                            '<span class="skill-float-arrow">↗</span>' +
                        '</div>';
                }
                skillFloat.innerHTML = floatHTML;

                // 绑定浮出标签点击
                skillFloat.querySelectorAll('.skill-float-tag').forEach(function(tag) {
                    tag.addEventListener('click', function() {
                        var sk = this.dataset.skill;
                        var mode = this.dataset.mode;
                        goToSkill(sk, mode || null);
                    });
                });

                // 渲染配置胶囊
                renderConfig(best);

            } else if (bestScore === 0) {
                detectedSkill = null;
                detectedSubMode = null;
                lastDetected = null;
                lastSubMode = null;
                skillFloat.innerHTML = '';
                configBar.innerHTML = '';
                configValues = {};
            }
        });

        // ===== 渲染配置胶囊 =====
        function renderConfig(sk) {
            var config = skills[sk].config;
            var theme = skills[sk].cssClass;
            configValues = {};
            config.forEach(function(c) { configValues[c.key] = c.options[0].value; });

            configBar.innerHTML = config.map(function(c) {
                return '<div class="cfg-capsule" data-key="' + c.key + '" data-theme="' + theme + '">' +
                    '<span class="cfg-value">' + c.options[0].text + '</span>' +
                    '<span class="cfg-arrow">▾</span>' +
                    '<div class="cfg-dropdown" id="cfgDrop_' + c.key + '">' +
                        c.options.map(function(o, i) {
                            return '<button class="cfg-drop-item' + (i === 0 ? ' selected' : '') + '" data-value="' + o.value + '" data-text="' + esc(o.text) + '">' + esc(o.text) + '</button>';
                        }).join('') +
                    '</div>' +
                '</div>';
            }).join('');

            // 绑定胶囊交互
            configBar.querySelectorAll('.cfg-capsule').forEach(function(cap) {
                cap.addEventListener('click', function(e) {
                    e.stopPropagation();
                    var dd = cap.querySelector('.cfg-dropdown');
                    var isOpen = dd.classList.contains('show');
                    closeAllCfgDropdowns();
                    if (!isOpen) {
                        dd.classList.add('show');
                        cap.classList.add('open');
                    }
                });
                cap.querySelectorAll('.cfg-drop-item').forEach(function(item) {
                    item.addEventListener('click', function(e) {
                        e.stopPropagation();
                        var key = cap.dataset.key;
                        var val = item.dataset.value;
                        var txt = item.dataset.text;
                        configValues[key] = val;
                        cap.querySelector('.cfg-value').textContent = txt;
                        // 高亮（非默认值）
                        var cfgDef = skills[detectedSkill].config.find(function(c) { return c.key === key; });
                        if (cfgDef && val !== cfgDef.options[0].value) {
                            cap.classList.add('modified');
                        } else {
                            cap.classList.remove('modified');
                        }
                        cap.querySelectorAll('.cfg-drop-item').forEach(function(d) { d.classList.remove('selected'); });
                        item.classList.add('selected');
                        closeAllCfgDropdowns();
                    });
                });
            });
        }

        function closeAllCfgDropdowns() {
            document.querySelectorAll('.cfg-dropdown.show').forEach(function(d) { d.classList.remove('show'); });
            document.querySelectorAll('.cfg-capsule.open').forEach(function(c) { c.classList.remove('open'); });
        }
        document.addEventListener('click', function() { closeAllCfgDropdowns(); });

        // ===== 提交 =====
        var nudgeToast = document.getElementById('nudgeToast');
        var nudgeIcon = document.getElementById('nudgeIcon');
        var nudgeText = document.getElementById('nudgeText');
        var nudgeBtn = document.getElementById('nudgeBtn');
        var inputBox = document.getElementById('inputBox');
        var uploadBtnEl = document.getElementById('uploadBtn');
        var linkBtnEl = document.getElementById('linkBtn');
        var nudgeTimer = null;

        // ===== 内联链接输入面板（替代 prompt） =====
        var linkPanel = document.getElementById('linkInputPanel');
        var linkField = document.getElementById('linkInputField');
        var linkConfirmBtn = document.getElementById('linkInputConfirm');
        var linkCloseBtn = document.getElementById('linkInputClose');
        var linkHint = document.getElementById('linkInputHint');
        var linkPanelAutoSubmit = false; // 确认后是否自动提交

        function showLinkPanel(autoSubmitAfter) {
            linkPanelAutoSubmit = !!autoSubmitAfter;
            linkField.value = '';
            linkHint.innerHTML = '';
            linkPanel.classList.add('show');
            setTimeout(function() { linkField.focus(); }, 80);
        }

        function hideLinkPanel() {
            linkPanel.classList.remove('show');
            linkField.value = '';
            linkHint.innerHTML = '';
        }

        function confirmLinkPanel() {
            var url = linkField.value.trim();
            if (!url) {
                linkField.style.borderColor = 'rgba(239,68,68,0.6)';
                linkField.setAttribute('placeholder', '请粘贴链接后确认');
                setTimeout(function() {
                    linkField.style.borderColor = '';
                    linkField.setAttribute('placeholder', '粘贴直播/视频链接...');
                }, 1500);
                return;
            }
            // 验证基本 URL 格式
            if (url.indexOf('.') === -1 && url.indexOf(':') === -1) {
                linkHint.innerHTML = '<span style="color:#f87171;">⚠ 请输入有效的链接地址</span>';
                return;
            }
            liveLink = url;
            uploadedFile = null;
            refImage = null;
            renderAttachBar();
            hideLinkPanel();
            if (linkPanelAutoSubmit) {
                setTimeout(function() { handleSubmit(); }, 100);
            }
        }

        // 确认按钮
        linkConfirmBtn.addEventListener('click', confirmLinkPanel);

        // 关闭按钮
        linkCloseBtn.addEventListener('click', hideLinkPanel);

        // Enter 键确认
        linkField.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                confirmLinkPanel();
            }
            if (e.key === 'Escape') {
                hideLinkPanel();
            }
        });

        // 实时输入 / 粘贴 → 平台检测提示
        linkField.addEventListener('input', updateLinkHint);
        linkField.addEventListener('paste', function() {
            // paste 事件触发时 value 还没更新，延迟读取
            setTimeout(updateLinkHint, 50);
        });

        function updateLinkHint() {
            var v = linkField.value.trim();
            if (!v) { linkHint.innerHTML = ''; return; }
            var pName = detectPlatform(v);
            if (pName) {
                var icons = { '抖音': '🎵', '快手': '⚡', 'B站': '📺', '淘宝': '🛒', 'YouTube': '▶️', 'Twitch': '🎮' };
                var icon = icons[pName] || '🔗';
                linkHint.innerHTML = '<span style="color:#34d399;">检测到 ' + icon + ' ' + pName + ' 链接</span>';
            } else {
                linkHint.innerHTML = '<span style="color:var(--text-faint);">支持 抖音 / 快手 / B站 / 淘宝 / YouTube / Twitch</span>';
            }
        }

        // 点击面板外部关闭
        document.addEventListener('click', function(e) {
            if (linkPanel.classList.contains('show') && !linkPanel.contains(e.target) &&
                e.target !== linkBtnEl && !linkBtnEl.contains(e.target)) {
                hideLinkPanel();
            }
        });

        submitBtn.addEventListener('click', handleSubmit);
        inputEl.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSubmit();
            }
        });

        function showNudge(type, icon, text, btnText, btnAction) {
            // 清除上次的 timer
            if (nudgeTimer) clearTimeout(nudgeTimer);
            // 设置样式
            nudgeToast.className = 'nudge-toast nudge-toast--' + type;
            nudgeIcon.textContent = icon;
            nudgeText.textContent = text;
            nudgeBtn.textContent = btnText;
            nudgeBtn.onclick = function(e) { e.stopPropagation(); hideNudge(); btnAction(); };
            // shake 输入框
            inputBox.classList.remove('shake');
            void inputBox.offsetWidth; // reflow
            inputBox.classList.add('shake');
            // 显示
            requestAnimationFrame(function() {
                nudgeToast.classList.add('show');
            });
            // 5 秒后自动隐藏
            nudgeTimer = setTimeout(function() { hideNudge(); }, 5000);
        }

        function hideNudge() {
            nudgeToast.classList.remove('show');
            if (nudgeTimer) { clearTimeout(nudgeTimer); nudgeTimer = null; }
        }

        function pulseBtn(btn, colorClass) {
            btn.classList.remove('nudge-pulse', 'nudge-pulse--green', 'nudge-pulse--orange');
            void btn.offsetWidth;
            btn.classList.add('nudge-pulse', colorClass);
            setTimeout(function() { btn.classList.remove('nudge-pulse', colorClass); }, 4600);
        }

        function triggerUpload() {
            hideNudge();
            pulseBtn(uploadBtnEl, 'nudge-pulse--green');
            // 自动弹出文件选择器
            var fi = document.createElement('input');
            fi.type = 'file';
            fi.accept = 'video/*,.mp4,.mov,.avi,.mkv';
            fi.onchange = function(e) {
                var f = e.target.files[0];
                if (!f) return;
                uploadedFile = f;
                refImage = null;
                liveLink = '';
                renderAttachBar();
                // 文件已选择，自动继续提交流程
                setTimeout(function() { handleSubmit(); }, 100);
            };
            fi.click();
        }

        function triggerLinkInput() {
            hideNudge();
            pulseBtn(linkBtnEl, 'nudge-pulse--orange');
            // 使用内联面板替代 prompt()
            showLinkPanel(true);
        }

        function handleSubmit() {
            var text = inputEl.value.trim();
            if (!text && !detectedSkill && !uploadedFile && !liveLink && !refImage) return;
            var sk = detectedSkill || 'translate';

            // ===== 智能引导：检查是否缺少必要素材 =====
            if (sk === 'translate' && !uploadedFile) {
                showNudge('translate', '📹', '请先上传一个视频文件', '上传视频', triggerUpload);
                return;
            }
            if (sk === 'livestream' && !liveLink) {
                showNudge('livestream', '🔗', '请先添加直播链接', '添加链接', triggerLinkInput);
                return;
            }

            // ===== 一切就绪，直接跳转 =====
            goToSkill(sk, detectedSubMode);
        }

        function goToSkill(sk, mode) {
            var text = inputEl.value.trim();
            var url = skills[sk].url;
            var params = [];
            if (text) params.push('prompt=' + encodeURIComponent(text));
            // 带上配置值
            Object.keys(configValues).forEach(function(k) {
                params.push(k + '=' + encodeURIComponent(configValues[k]));
            });
            // 传递 translate 子功能 mode 参数
            var m = mode || detectedSubMode;
            if (sk === 'translate' && m) params.push('mode=' + m);
            if (sk === 'livestream' && liveLink) params.push('liveUrl=' + encodeURIComponent(liveLink));

            // 将上传的文件信息存入 sessionStorage，供目标页面读取
            if (uploadedFile) {
                sessionStorage.setItem('tideo_pending_file', JSON.stringify({
                    name: uploadedFile.name,
                    size: uploadedFile.size,
                    type: uploadedFile.type
                }));
            } else {
                sessionStorage.removeItem('tideo_pending_file');
            }

            // ★ 写入任务定义到 sessionStorage，供功能页的任务清单面板读取
            sessionStorage.setItem('tideo_tasks', JSON.stringify({
                skill: sk,
                config: configValues,
                prompt: text
            }));

            if (params.length) url += '?' + params.join('&');
            window.location.href = url;
        }

        // ===== 附件标签 =====
        function renderAttachBar() {
            attachBar.innerHTML = '';
            // 附件变更后自动隐藏引导提示
            hideNudge();

            if (uploadedFile) {
                var sizeMB = (uploadedFile.size / 1048576).toFixed(1);
                attachBar.innerHTML =
                    '<div class="attach-tag">' +
                        '<span class="attach-tag-icon">🎬</span>' +
                        '<span class="attach-tag-name">' + esc(uploadedFile.name) + '</span>' +
                        '<span class="attach-tag-meta">' + sizeMB + ' MB</span>' +
                        '<button class="attach-tag-remove" id="rmAttach" title="移除">' +
                            '<svg width="10" height="10" viewBox="0 0 12 12" fill="none"><path d="M2 2L10 10M10 2L2 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>' +
                        '</button>' +
                    '</div>';
                document.getElementById('rmAttach').onclick = function() { uploadedFile = null; renderAttachBar(); };
            } else if (liveLink) {
                var platform = detectPlatform(liveLink);
                var short = liveLink.length > 40 ? liveLink.substring(0, 40) + '...' : liveLink;
                attachBar.innerHTML =
                    '<div class="attach-tag attach-tag--link">' +
                        (platform ? '<span class="attach-platform">' + platform + '</span>' : '') +
                        '<span class="attach-tag-name">' + esc(short) + '</span>' +
                        '<button class="attach-tag-remove" id="rmAttach" title="移除">' +
                            '<svg width="10" height="10" viewBox="0 0 12 12" fill="none"><path d="M2 2L10 10M10 2L2 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>' +
                        '</button>' +
                    '</div>';
                document.getElementById('rmAttach').onclick = function() { liveLink = ''; renderAttachBar(); };
            } else if (refImage) {
                var url = URL.createObjectURL(refImage);
                attachBar.innerHTML =
                    '<div class="attach-tag">' +
                        '<img class="attach-tag-thumb" src="' + url + '" alt="参考图">' +
                        '<span class="attach-tag-name">' + esc(refImage.name) + '</span>' +
                        '<button class="attach-tag-remove" id="rmAttach" title="移除">' +
                            '<svg width="10" height="10" viewBox="0 0 12 12" fill="none"><path d="M2 2L10 10M10 2L2 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>' +
                        '</button>' +
                    '</div>';
                document.getElementById('rmAttach').onclick = function() { refImage = null; renderAttachBar(); };
            }
        }

        function detectPlatform(url) {
            if (!url) return '';
            var u = url.toLowerCase();
            var list = [
                { k: ['douyin','iesdouyin'], n: '抖音' },
                { k: ['kuaishou','gifshow'], n: '快手' },
                { k: ['bilibili','b23.tv'], n: 'B站' },
                { k: ['taobao','tbopen'], n: '淘宝' },
                { k: ['youtube','youtu.be'], n: 'YouTube' },
                { k: ['twitch'], n: 'Twitch' }
            ];
            for (var i = 0; i < list.length; i++)
                for (var j = 0; j < list[i].k.length; j++)
                    if (u.indexOf(list[i].k[j]) !== -1) return list[i].n;
            return '';
        }

        function esc(s) {
            var d = document.createElement('div');
            d.appendChild(document.createTextNode(s));
            return d.innerHTML;
        }

        // ===== 上传按钮 =====
        uploadBtnEl.addEventListener('click', function() {
            hideNudge();
            var fi = document.createElement('input');
            fi.type = 'file';
            fi.accept = 'video/*,image/*,.mp4,.mov,.avi,.mkv';
            fi.onchange = function(e) {
                var f = e.target.files[0];
                if (!f) return;
                if (f.type.startsWith('image/')) {
                    refImage = f;
                    uploadedFile = null;
                } else {
                    uploadedFile = f;
                    refImage = null;
                }
                liveLink = '';
                renderAttachBar();
            };
            fi.click();
        });

        // ===== 链接按钮 =====
        linkBtnEl.addEventListener('click', function() {
            hideNudge();
            showLinkPanel(false);
        });

    })();
    </script>
    <!-- 用户菜单 -->
    <script>
    (function() {
        var avatar = document.getElementById('userAvatar');
        var avatarLetter = document.getElementById('userAvatarLetter');
        var dropdown = document.getElementById('userDropdown');
        var dropdownAvatar = document.getElementById('dropdownAvatar');
        var dropdownName = document.getElementById('dropdownName');
        var dropdownHint = document.getElementById('dropdownHint');
        var loginBtn = document.getElementById('userLoginBtn');
        var logoutBtn = document.getElementById('userLogoutBtn');

        function updateUserUI() {
            var raw = localStorage.getItem('tideo_user');
            if (raw) {
                try {
                    var user = JSON.parse(raw);
                    var initial = user.avatar || user.name.charAt(0).toUpperCase();
                    avatarLetter.textContent = initial;
                    dropdownAvatar.textContent = initial;
                    dropdownName.textContent = user.name;
                    dropdownHint.textContent = '已登录';
                    loginBtn.style.display = 'none';
                    logoutBtn.style.display = 'flex';
                    avatar.title = user.name;
                } catch(e) {}
            } else {
                avatarLetter.textContent = 'U';
                dropdownAvatar.textContent = 'U';
                dropdownName.textContent = '未登录';
                dropdownHint.textContent = '点击登录';
                loginBtn.style.display = 'flex';
                logoutBtn.style.display = 'none';
                avatar.title = '用户';
            }
        }

        avatar.addEventListener('click', function(e) {
            e.stopPropagation();
            dropdown.classList.toggle('show');
        });

        document.addEventListener('click', function(e) {
            if (!dropdown.contains(e.target) && e.target !== avatar) {
                dropdown.classList.remove('show');
            }
        });

        loginBtn.addEventListener('click', function(e) {
            e.preventDefault();
            window.location.href = 'login.html';
        });

        logoutBtn.addEventListener('click', function(e) {
            e.preventDefault();
            localStorage.removeItem('tideo_user');
            updateUserUI();
            dropdown.classList.remove('show');
        });

        updateUserUI();

        window.addEventListener('storage', function(e) {
            if (e.key === 'tideo_user') updateUserUI();
        });
    })();
    </script>
</body>
</html>
