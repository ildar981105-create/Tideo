<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>创作 — Tideo</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
    /* ===== create.html 首页 — AI 统一入口 ===== */
    .create-home {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 40px 32px;
        overflow-y: auto;
    }
    .create-home::-webkit-scrollbar { width: 5px; }
    .create-home::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }

    .create-home-inner {
        max-width: 720px;
        width: 100%;
        text-align: center;
    }

    /* ---- Hero 标题 ---- */
    .create-hero {
        margin-bottom: 32px;
    }
    .create-hero h1 {
        font-size: 2rem;
        font-weight: 800;
        line-height: 1.35;
        margin: 0 0 10px;
        letter-spacing: -0.02em;
    }
    .create-hero h1 .gradient-text {
        background: linear-gradient(135deg, #a855f7, #6366f1, #06b6d4);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }
    .create-hero p {
        font-size: 0.9rem;
        color: var(--text-muted);
        margin: 0;
    }

    /* ---- Skill 选择器胶囊 ---- */
    .skill-selector {
        display: flex;
        justify-content: center;
        gap: 8px;
        margin-bottom: 20px;
        flex-wrap: wrap;
    }
    .skill-pill {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        padding: 8px 18px;
        font-size: 0.82rem;
        font-weight: 600;
        color: var(--text-muted);
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 100px;
        cursor: pointer;
        transition: all 0.25s ease;
        font-family: inherit;
        position: relative;
        white-space: nowrap;
    }
    .skill-pill:hover {
        color: var(--text-primary);
        border-color: rgba(255,255,255,0.18);
        background: rgba(255,255,255,0.05);
        transform: translateY(-1px);
    }
    .skill-pill.active {
        color: #fff;
        border-color: rgba(99,102,241,0.5);
        background: rgba(99,102,241,0.12);
        box-shadow: 0 0 20px rgba(99,102,241,0.15);
    }
    .skill-pill--translate.active {
        color: #34d399;
        border-color: rgba(16,185,129,0.45);
        background: rgba(16,185,129,0.1);
        box-shadow: 0 0 20px rgba(16,185,129,0.12);
    }
    .skill-pill--livestream.active {
        color: #fb923c;
        border-color: rgba(249,115,22,0.45);
        background: rgba(249,115,22,0.1);
        box-shadow: 0 0 20px rgba(249,115,22,0.12);
    }
    .skill-pill--generate.active {
        color: #c084fc;
        border-color: rgba(168,85,247,0.45);
        background: rgba(168,85,247,0.1);
        box-shadow: 0 0 20px rgba(168,85,247,0.12);
    }
    .skill-pill .skill-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: currentColor;
        opacity: 0.6;
    }
    .skill-pill.active .skill-dot {
        opacity: 1;
        animation: skillDotPulse 2s ease-in-out infinite;
    }
    @keyframes skillDotPulse {
        0%, 100% { box-shadow: 0 0 0 0 currentColor; }
        50% { box-shadow: 0 0 0 4px transparent; }
    }
    .skill-pill .skill-badge {
        font-size: 0.58rem;
        font-weight: 700;
        padding: 1px 6px;
        border-radius: 4px;
        background: rgba(16,185,129,0.15);
        color: #34d399;
        margin-left: 2px;
    }

    /* ---- 统一输入框 ---- */
    .create-input-wrap {
        margin-bottom: 24px;
    }
    .create-input-box {
        background: rgba(255,255,255,0.025);
        border: 2px solid rgba(255,255,255,0.08);
        border-radius: 18px;
        transition: all 0.3s;
        overflow: hidden;
    }
    .create-input-box:focus-within {
        border-color: rgba(99,102,241,0.35);
        box-shadow: 0 0 0 4px rgba(99,102,241,0.06), 0 0 40px rgba(99,102,241,0.05);
    }
    .create-input-box.skill-translate:focus-within {
        border-color: rgba(16,185,129,0.35);
        box-shadow: 0 0 0 4px rgba(16,185,129,0.06), 0 0 40px rgba(16,185,129,0.05);
    }
    .create-input-box.skill-livestream:focus-within {
        border-color: rgba(249,115,22,0.35);
        box-shadow: 0 0 0 4px rgba(249,115,22,0.06), 0 0 40px rgba(249,115,22,0.05);
    }
    .create-input-box.skill-generate:focus-within {
        border-color: rgba(168,85,247,0.35);
        box-shadow: 0 0 0 4px rgba(168,85,247,0.06), 0 0 40px rgba(168,85,247,0.05);
    }

    /* ---- Action Slot ---- */
    .action-slot {
        padding: 10px 14px 0;
        transition: all 0.35s cubic-bezier(.4,0,.2,1);
    }
    .action-slot:empty { padding: 0; }

    /* 视频译制 — 上传区（单行紧凑） */
    .action-upload-zone {
        display: flex;
        align-items: center;
        gap: 8px;
        border: 1px solid rgba(16,185,129,0.2);
        border-radius: 12px;
        padding: 0 12px;
        height: 42px;
        cursor: pointer;
        transition: all 0.25s;
        background: rgba(16,185,129,0.03);
        position: relative;
    }
    .action-upload-zone:hover {
        border-color: rgba(16,185,129,0.45);
        background: rgba(16,185,129,0.06);
    }
    .action-upload-zone.dragover {
        border-color: rgba(16,185,129,0.6);
        background: rgba(16,185,129,0.1);
        box-shadow: 0 0 24px rgba(16,185,129,0.08);
    }
    .action-upload-zone input[type="file"] {
        display: none;
    }
    .upload-zone-icon {
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
    }
    .upload-zone-text {
        flex: 1;
        font-size: 0.82rem;
        font-weight: 600;
        color: #34d399;
        text-align: left;
    }
    .upload-zone-hint {
        font-size: 0.68rem;
        color: var(--text-faint);
        flex-shrink: 0;
    }
    /* 上传后文件预览 */
    .upload-file-preview {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        background: rgba(16,185,129,0.06);
        border: 1px solid rgba(16,185,129,0.2);
        border-radius: 12px;
    }
    .upload-file-icon {
        width: 28px; height: 28px;
        border-radius: 6px;
        background: rgba(16,185,129,0.12);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.85rem;
        flex-shrink: 0;
    }
    .upload-file-info { flex: 1; min-width: 0; text-align: left; }
    .upload-file-name {
        font-size: 0.78rem;
        font-weight: 600;
        color: var(--text-primary);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }
    .upload-file-size {
        font-size: 0.65rem;
        color: var(--text-faint);
        font-family: 'JetBrains Mono', monospace;
    }
    .upload-file-remove {
        width: 28px; height: 28px;
        border-radius: 6px;
        border: none;
        background: rgba(239,68,68,0.08);
        color: #ef4444;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
        flex-shrink: 0;
        font-family: inherit;
    }
    .upload-file-remove:hover {
        background: rgba(239,68,68,0.15);
    }

    /* 直播剪辑 — 链接栏 */
    .action-link-bar {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 0 12px;
        height: 42px;
        border: 1px solid rgba(249,115,22,0.2);
        border-radius: 12px;
        background: rgba(249,115,22,0.03);
        transition: all 0.25s;
    }
    .action-link-bar:focus-within {
        border-color: rgba(249,115,22,0.4);
        background: rgba(249,115,22,0.06);
    }
    .link-bar-icon {
        font-size: 1rem;
        flex-shrink: 0;
        width: 28px;
        text-align: center;
        line-height: 1;
    }
    .link-bar-input {
        flex: 1;
        border: none;
        background: none;
        color: var(--text-primary);
        font-size: 0.82rem;
        font-family: 'JetBrains Mono', monospace;
        outline: none;
        min-width: 0;
    }
    .link-bar-input::placeholder {
        color: var(--text-faint);
        font-family: inherit;
    }
    .link-bar-paste-btn {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 6px 14px;
        font-size: 0.72rem;
        font-weight: 600;
        color: #fb923c;
        background: rgba(249,115,22,0.1);
        border: 1px solid rgba(249,115,22,0.25);
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.2s;
        font-family: inherit;
        white-space: nowrap;
        flex-shrink: 0;
    }
    .link-bar-paste-btn:hover {
        background: rgba(249,115,22,0.18);
        border-color: rgba(249,115,22,0.4);
    }
    .link-platform-tag {
        font-size: 0.62rem;
        font-weight: 700;
        padding: 2px 7px;
        border-radius: 4px;
        background: rgba(249,115,22,0.12);
        color: #fb923c;
        white-space: nowrap;
        flex-shrink: 0;
    }

    /* AI 生成 — 参考图（单行紧凑） */
    .action-ref-upload {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 0 12px;
        height: 42px;
        border: 1px dashed rgba(168,85,247,0.25);
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.25s;
        background: rgba(168,85,247,0.03);
        width: 100%;
    }
    .action-ref-upload:hover {
        border-color: rgba(168,85,247,0.45);
        background: rgba(168,85,247,0.06);
    }
    .action-ref-upload input[type="file"] { display: none; }
    .ref-upload-icon {
        font-size: 1rem;
        flex-shrink: 0;
        width: 28px;
        text-align: center;
        line-height: 1;
    }
    .ref-upload-text {
        flex: 1;
        font-size: 0.82rem;
        font-weight: 500;
        color: #c084fc;
        text-align: left;
    }
    .ref-upload-hint {
        font-size: 0.68rem;
        color: var(--text-faint);
        flex-shrink: 0;
    }
    /* 参考图预览 */
    .ref-preview {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        background: rgba(168,85,247,0.06);
        border: 1px solid rgba(168,85,247,0.2);
        border-radius: 12px;
        width: 100%;
    }
    .ref-preview-thumb {
        width: 28px; height: 28px;
        border-radius: 6px;
        object-fit: cover;
    }
    .ref-preview-name {
        font-size: 0.75rem;
        color: var(--text-secondary);
        max-width: 140px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }
    .ref-preview-remove {
        width: 24px; height: 24px;
        border-radius: 5px;
        border: none;
        background: rgba(239,68,68,0.08);
        color: #ef4444;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
        font-family: inherit;
    }
    .ref-preview-remove:hover { background: rgba(239,68,68,0.15); }

    /* ---- Textarea ---- */
    .create-input-textarea {
        width: 100%;
        min-height: 72px;
        max-height: 160px;
        padding: 12px 18px 6px;
        background: transparent;
        border: none;
        color: var(--text-primary);
        font-size: 0.92rem;
        font-family: inherit;
        outline: none;
        resize: none;
        line-height: 1.7;
    }
    .create-input-textarea::placeholder { color: var(--text-faint); }

    /* ---- Config Capsules 配置胶囊 ---- */
    .config-capsules {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        padding: 4px 16px 10px;
        transition: all 0.3s;
    }
    .config-capsule {
        position: relative;
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 5px 12px;
        font-size: 0.72rem;
        font-weight: 500;
        color: var(--text-muted);
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 100px;
        cursor: pointer;
        transition: all 0.2s;
        font-family: inherit;
        user-select: none;
    }
    .config-capsule:hover {
        color: var(--text-primary);
        border-color: rgba(255,255,255,0.18);
        background: rgba(255,255,255,0.06);
    }
    .config-capsule.modified {
        border-color: rgba(99,102,241,0.35);
        color: var(--text-primary);
        background: rgba(99,102,241,0.06);
    }
    .skill-translate .config-capsule.modified {
        border-color: rgba(16,185,129,0.35);
        background: rgba(16,185,129,0.06);
        color: #34d399;
    }
    .skill-livestream .config-capsule.modified {
        border-color: rgba(249,115,22,0.35);
        background: rgba(249,115,22,0.06);
        color: #fb923c;
    }
    .skill-generate .config-capsule.modified {
        border-color: rgba(168,85,247,0.35);
        background: rgba(168,85,247,0.06);
        color: #c084fc;
    }
    .capsule-value {
        font-weight: 600;
    }
    .capsule-arrow {
        font-size: 0.55rem;
        opacity: 0.5;
        transition: transform 0.2s;
    }
    .config-capsule.open .capsule-arrow {
        transform: rotate(180deg);
    }

    /* Capsule Dropdown */
    .capsule-dropdown {
        position: absolute;
        top: calc(100% + 6px);
        left: 50%;
        transform: translateX(-50%);
        min-width: 120px;
        background: rgba(15,15,26,0.96);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 10px;
        padding: 4px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        z-index: 100;
        opacity: 0;
        visibility: hidden;
        transition: all 0.2s cubic-bezier(.4,0,.2,1);
    }
    .capsule-dropdown.show {
        opacity: 1;
        visibility: visible;
        transform: translateX(-50%) translateY(0);
    }
    .capsule-dropdown-item {
        display: block;
        width: 100%;
        padding: 7px 12px;
        font-size: 0.72rem;
        font-weight: 500;
        color: var(--text-muted);
        background: none;
        border: none;
        border-radius: 7px;
        cursor: pointer;
        transition: all 0.15s;
        text-align: left;
        white-space: nowrap;
        font-family: inherit;
    }
    .capsule-dropdown-item:hover {
        color: var(--text-primary);
        background: rgba(255,255,255,0.06);
    }
    .capsule-dropdown-item.selected {
        color: #a78bfa;
        background: rgba(99,102,241,0.08);
    }

    /* Toolbar 底栏 */
    .create-input-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 6px 14px 10px;
        border-top: 1px solid rgba(255,255,255,0.04);
    }
    .create-input-left {
        display: flex;
        align-items: center;
        gap: 6px;
    }
    .create-input-icon-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 32px;
        height: 32px;
        border-radius: 8px;
        border: none;
        background: rgba(255,255,255,0.04);
        color: var(--text-faint);
        cursor: pointer;
        transition: all 0.2s;
        font-family: inherit;
    }
    .create-input-icon-btn:hover {
        color: var(--text-secondary);
        background: rgba(255,255,255,0.08);
    }
    .create-char-count {
        font-size: 0.68rem;
        color: var(--text-faint);
        font-family: 'JetBrains Mono', monospace;
        margin-left: 4px;
    }
    .create-submit-btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 9px 22px;
        font-size: 0.82rem;
        font-weight: 700;
        color: #fff;
        background: linear-gradient(135deg, #a855f7, #6366f1);
        border: none;
        border-radius: 12px;
        cursor: pointer;
        font-family: inherit;
        box-shadow: 0 0 24px rgba(99,102,241,0.25);
        transition: all 0.2s;
        position: relative;
        overflow: hidden;
    }
    .create-submit-btn:hover { transform: translateY(-1px); box-shadow: 0 0 40px rgba(99,102,241,0.35); }
    .create-submit-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; box-shadow: none !important; }
    .create-submit-btn::before {
        content: '';
        position: absolute; top: -50%; left: -50%;
        width: 200%; height: 200%;
        background: conic-gradient(from 0deg, transparent, rgba(255,255,255,0.1), transparent 30%);
        animation: shimmer 3s linear infinite;
    }
    @keyframes shimmer {
        to { transform: rotate(360deg); }
    }

    /* ---- 快捷提示词 chips ---- */
    .create-prompts-wrap {
        margin-bottom: 20px;
    }
    .create-prompts-label {
        font-size: 0.72rem;
        font-weight: 600;
        color: var(--text-faint);
        margin-bottom: 10px;
    }
    .create-prompts-chips {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: center;
    }
    .create-prompt-chip {
        padding: 7px 16px;
        font-size: 0.78rem;
        font-weight: 500;
        color: var(--text-secondary);
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 100px;
        cursor: pointer;
        transition: all 0.25s;
        display: flex;
        align-items: center;
        gap: 6px;
        font-family: inherit;
    }
    .create-prompt-chip:hover {
        color: var(--text-primary);
        border-color: rgba(99,102,241,0.35);
        background: rgba(99,102,241,0.06);
        transform: translateY(-2px);
    }
    .create-prompt-chip .chip-arrow {
        opacity: 0;
        transform: translateX(-4px);
        transition: all 0.25s;
        font-size: 0.7rem;
    }
    .create-prompt-chip:hover .chip-arrow {
        opacity: 0.7;
        transform: translateX(0);
    }

    /* ---- 底部能力标签 ---- */
    .create-caps {
        display: flex;
        gap: 20px;
        justify-content: center;
        margin-top: 20px;
    }
    .create-cap {
        display: flex;
        align-items: center;
        gap: 5px;
        font-size: 0.7rem;
        color: var(--text-faint);
    }
    .create-cap-dot {
        width: 4px; height: 4px;
        border-radius: 50%;
        background: rgba(99,102,241,0.4);
    }

    /* ---- 响应式 ---- */
    @media (max-width: 720px) {
        .create-home-inner { max-width: 100%; }
        .create-hero h1 { font-size: 1.5rem; }
        .skill-selector { gap: 6px; }
        .skill-pill { padding: 7px 14px; font-size: 0.75rem; }
        .config-capsules { gap: 5px; }
        .config-capsule { padding: 4px 10px; font-size: 0.68rem; }
    }
    @media (max-width: 480px) {
        .create-caps { flex-wrap: wrap; gap: 12px; }
    }

    /* ===== 用户下拉菜单 ===== */
    .icon-nav-avatar { position: relative; }
    .user-dropdown {
        position: absolute;
        bottom: 0;
        left: calc(100% + 10px);
        width: 200px;
        background: rgba(15,15,26,0.95);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 12px;
        padding: 8px;
        box-shadow: 0 12px 40px rgba(0,0,0,0.4), 0 0 30px rgba(99,102,241,0.06);
        opacity: 0;
        visibility: hidden;
        transform: translateY(6px);
        transition: all 0.2s cubic-bezier(.4,0,.2,1);
        z-index: 200;
    }
    .user-dropdown.show {
        opacity: 1;
        visibility: visible;
        transform: translateY(0);
    }
    .user-dropdown-header {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 8px 10px;
    }
    .user-dropdown-avatar {
        width: 32px; height: 32px;
        border-radius: 8px;
        background: linear-gradient(135deg, #a855f7, #6366f1, #3b82f6, #06b6d4);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.75rem;
        font-weight: 700;
        color: #fff;
        flex-shrink: 0;
    }
    .user-dropdown-info { min-width: 0; }
    .user-dropdown-name {
        font-size: 0.78rem;
        font-weight: 600;
        color: var(--text-primary);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }
    .user-dropdown-hint {
        font-size: 0.65rem;
        color: var(--text-faint);
    }
    .user-dropdown-divider {
        height: 1px;
        background: rgba(255,255,255,0.06);
        margin: 4px 0;
    }
    .user-dropdown-item {
        display: flex;

    <script>
    (function() {

                    ]},
                    { key: 'subtitle', label: '字幕', options: [
                        { value: 'bottom', text: '底部字幕' }, { value: 'bilingual', text: '双语字幕' },
                        { value: 'none', text: '不加字幕' }
                    ]},
                    { key: 'lipSync', label: '口型', options: [
                        { value: 'on', text: '同步:开' }, { value: 'off', text: '同步:关' }
                    ]},
                    { key: 'quality', label: '画质', options: [
                        { value: '720', text: '720p' }, { value: '1080', text: '1080p' },
                        { value: '4k', text: '4K' }
                    ]},
                    { key: 'speed', label: '速度', options: [
                        { value: 'fast', text: '极速' }, { value: 'standard', text: '标准' },
                        { value: 'quality', text: '质量优先' }
                    ]}
                ],
                caps: [
                    '口型同步', 'AI 配音', '30+ 语种', '字幕生成'
                ]
            },
            livestream: {
                name: '直播剪辑',
                url: 'livestream.html',
                inputClass: 'skill-livestream',
                placeholder: '补充说明，如"只要高光片段，竖屏输出"...',
                prompts: [
                    { icon: '🔴', text: '监控抖音直播，自动剪辑精彩片段', params: { platform: 'douyin' } },
                    { icon: '✂️', text: '把直播录像剪成 3 分钟短视频', params: { duration: 180 } },
                    { icon: '🛍️', text: '提取直播中的商品讲解片段', params: { mode: 'product' } },
                    { icon: '🏆', text: '自动识别游戏直播高光时刻', params: { mode: 'highlight' } }
                ],
                config: [
                    { key: 'platform', label: '平台', options: [
                        { value: 'douyin', text: '抖音' }, { value: 'kuaishou', text: '快手' },
                        { value: 'bilibili', text: 'B站' }, { value: 'taobao', text: '淘宝直播' },
                        { value: 'other', text: '其他' }
                    ]},
                    { key: 'clipDuration', label: '时长', options: [
                        { value: '30', text: '30秒' }, { value: '60', text: '1分钟' },
                        { value: '180', text: '3分钟' }, { value: '300', text: '5分钟' }
                    ]},
                    { key: 'clipCount', label: '数量', options: [
                        { value: '3', text: '3个' }, { value: '5', text: '5个' },
                        { value: '10', text: '10个' }, { value: 'auto', text: '自动' }
                    ]},
                    { key: 'ratio', label: '比例', options: [
                        { value: '9:16', text: '9:16竖屏' }, { value: '16:9', text: '16:9横屏' },
                        { value: '1:1', text: '1:1方形' }
                    ]},
                    { key: 'quality', label: '画质', options: [
                        { value: '720', text: '720p' }, { value: '1080', text: '1080p' }
                    ]},
                    { key: 'addCaption', label: '字幕', options: [
                        { value: 'on', text: '加字幕' }, { value: 'off', text: '不加' }
                    ]}
                ],
                caps: [
                    '实时监控', 'AI 识别', '多平台', '快速出片'
                ]
            },
            generate: {
                name: 'AI 生成',
                url: 'generate.html',
                inputClass: 'skill-generate',
                placeholder: '描述你想生成的视频内容...',
                prompts: [
                    { icon: '📦', text: '用产品图生成 15 秒广告视频', params: { mode: 'product' } },
                    { icon: '🎬', text: '写一个温暖的咖啡店故事短片', params: { mode: 'story' } },
                    { icon: '📱', text: '把这段文案变成竖屏短视频', params: { ratio: '9:16' } },
                    { icon: '✈️', text: '生成一段旅行 Vlog 风格视频', params: { style: 'vlog' } }
                ],
                config: [
                    { key: 'style', label: '风格', options: [
                        { value: 'cinematic', text: '电影感' }, { value: 'realistic', text: '写实' },
                        { value: 'anime', text: '动画' }, { value: 'cyber', text: '赛博朋克' },
                        { value: 'watercolor', text: '水彩画' }, { value: '3d', text: '3D渲染' }
                    ]},
                    { key: 'ratio', label: '比例', options: [
                        { value: '16:9', text: '16:9横屏' }, { value: '9:16', text: '9:16竖屏' },
                        { value: '1:1', text: '1:1方形' }
                    ]},
                    { key: 'duration', label: '时长', options: [
                        { value: '15', text: '15秒' }, { value: '30', text: '30秒' },
                        { value: '60', text: '1分钟' }, { value: '180', text: '3分钟' }
                    ]},
                    { key: 'quality', label: '画质', options: [
                        { value: '720', text: '720p' }, { value: '1080', text: '1080p' },
                        { value: '4k', text: '4K' }
                    ]},
                    { key: 'bgm', label: '配乐', options: [
                        { value: 'auto', text: '自动配乐' }, { value: 'none', text: '无' },
                        { value: 'upbeat', text: '轻快' }, { value: 'cinematic', text: '大气' }
                    ]},
                    { key: 'voice', label: '旁白', options: [
                        { value: 'none', text: '无旁白' }, { value: 'female', text: '女声旁白' },
                        { value: 'male', text: '男声旁白' }
                    ]}
                ],
                caps: [
                    '4K 超清', '自动配乐', 'AI 声音克隆', '3 分钟出片'
                ]
            }
        };

        var currentSkill = 'translate';
        var uploadedFile = null;   // 视频译制上传的文件
        var refImage = null;       // AI 生成参考图
        var liveLink = '';         // 直播剪辑链接
        var configValues = {};     // 当前胶囊的选中值

        // ===== DOM =====
        var inputBox = document.getElementById('createInputBox');
        var inputEl = document.getElementById('createInput');
        var charCount = document.getElementById('createCharCount');
        var actionSlot = document.getElementById('actionSlot');
        var configCapsules = document.getElementById('configCapsules');
        var promptsChips = document.getElementById('promptsChips');
        var capsEl = document.getElementById('createCaps');

        // ===== 字符计数 =====
        inputEl.addEventListener('input', function() {
            charCount.textContent = this.value.length;
        });

        // ===== Skill 切换 =====
        document.querySelectorAll('.skill-pill').forEach(function(pill) {
            pill.addEventListener('click', function() {
                var sk = this.dataset.skill;
                if (sk === currentSkill) return;
                document.querySelectorAll('.skill-pill').forEach(function(p) { p.classList.remove('active'); });
                this.classList.add('active');
                currentSkill = sk;
                uploadedFile = null;
                refImage = null;
                liveLink = '';
                renderSkill(sk);
            });
        });

        function renderSkill(sk) {
            var skill = skills[sk];
            inputBox.className = 'create-input-box ' + skill.inputClass;
            inputEl.placeholder = skill.placeholder;
            inputEl.value = '';
            charCount.textContent = '0';
            renderActionSlot(sk);
            renderCapsules(skill.config);
            renderPrompts(skill.prompts);
            renderCaps(skill.caps);
        }

        // ===== Action Slot =====
        function renderActionSlot(sk) {
            actionSlot.innerHTML = '';
            if (sk === 'translate') {
                renderUploadZone();
            } else if (sk === 'livestream') {
                renderLinkBar();
            } else if (sk === 'generate') {
                renderRefUpload();
            }
        }

        // -- 视频译制：上传区 --
        function renderUploadZone() {
            if (uploadedFile) {
                renderUploadPreview();
                return;
            }
            actionSlot.innerHTML = 
                '<div class="action-upload-zone" id="uploadZone">' +
                    '<input type="file" accept="video/*,.mp4,.mov,.avi,.mkv,.flv,.wmv" id="uploadZoneInput">' +
                    '<span class="upload-zone-icon"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 10V3M8 3L11 6M8 3L5 6" stroke="#34d399" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/><path d="M2 10V12C2 12.5523 2.44772 13 3 13H13C13.5523 13 14 12.5523 14 12V10" stroke="#34d399" stroke-width="1.3" stroke-linecap="round"/></svg></span>' +
                    '<span class="upload-zone-text">点击或拖拽上传视频</span>' +
                    '<span class="upload-zone-hint">支持 MP4 / MOV / AVI · 最大 2GB</span>' +
                '</div>';
            var zone = document.getElementById('uploadZone');
            var fileInput = document.getElementById('uploadZoneInput');
            zone.addEventListener('click', function() { fileInput.click(); });
            fileInput.addEventListener('change', function(e) {
                if (e.target.files[0]) {
                    uploadedFile = e.target.files[0];
                    renderUploadPreview();
                }
            });
            // 拖拽
            zone.addEventListener('dragover', function(e) { e.preventDefault(); zone.classList.add('dragover'); });
            zone.addEventListener('dragleave', function() { zone.classList.remove('dragover'); });
            zone.addEventListener('drop', function(e) {
                e.preventDefault();
                zone.classList.remove('dragover');
                var f = e.dataTransfer.files[0];
                if (f && f.type.startsWith('video/')) {
                    uploadedFile = f;
                    renderUploadPreview();
                }
            });
        }

        function renderUploadPreview() {
            var sizeMB = (uploadedFile.size / 1048576).toFixed(1);
            actionSlot.innerHTML = 
                '<div class="upload-file-preview">' +
                    '<div class="upload-file-icon">🎬</div>' +
                    '<div class="upload-file-info">' +
                        '<div class="upload-file-name">' + escHTML(uploadedFile.name) + '</div>' +
                        '<div class="upload-file-size">' + sizeMB + ' MB</div>' +
                    '</div>' +
                    '<button class="upload-file-remove" id="uploadRemoveBtn" title="移除">' +
                        '<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 2L10 10M10 2L2 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>' +
                    '</button>' +
                '</div>';
            document.getElementById('uploadRemoveBtn').addEventListener('click', function() {
                uploadedFile = null;
                renderUploadZone();
            });
        }

        // -- 直播剪辑：链接栏 --
        function renderLinkBar() {
            actionSlot.innerHTML = 
                '<div class="action-link-bar">' +
                    '<span class="link-bar-icon" id="linkPlatformIcon">🔗</span>' +
                    '<input type="url" class="link-bar-input" id="linkBarInput" placeholder="粘贴直播/录像链接..." value="' + escHTML(liveLink) + '">' +
                    '<span class="link-platform-tag" id="linkPlatformTag" style="display:none"></span>' +
                    '<button class="link-bar-paste-btn" id="linkBarPasteBtn">' +
                        '<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><rect x="4" y="1" width="7" height="9" rx="1.5" stroke="currentColor" stroke-width="1.2"/><path d="M1 4V10.5C1 11.0523 1.44772 11.5 2 11.5H7" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>' +
                        ' 粘贴' +
                    '</button>' +
                '</div>';
            var linkInput = document.getElementById('linkBarInput');
            var pasteBtn = document.getElementById('linkBarPasteBtn');
            
            linkInput.addEventListener('input', function() {
                liveLink = this.value;
                detectPlatform(this.value);
            });
            
            pasteBtn.addEventListener('click', function() {
                if (navigator.clipboard && navigator.clipboard.readText) {
                    navigator.clipboard.readText().then(function(text) {
                        if (text && text.trim()) {
                            linkInput.value = text.trim();
                            liveLink = text.trim();
                            detectPlatform(text.trim());
                        }
                    }).catch(function() {
                        linkInput.focus();
                    });
                } else {
                    linkInput.focus();
                }
            });

            if (liveLink) detectPlatform(liveLink);
        }

        function detectPlatform(url) {
            var icon = document.getElementById('linkPlatformIcon');
            var tag = document.getElementById('linkPlatformTag');
            if (!url) { icon.textContent = '🔗'; tag.style.display = 'none'; return; }
            var u = url.toLowerCase();
            var platforms = [
                { keys: ['douyin', 'iesdouyin'], icon: '📱', name: '抖音' },
                { keys: ['kuaishou', 'gifshow'], icon: '📹', name: '快手' },
                { keys: ['bilibili', 'b23.tv'], icon: '📺', name: 'B站' },
                { keys: ['taobao', 'tbopen'], icon: '🛒', name: '淘宝' },
                { keys: ['youtube', 'youtu.be'], icon: '▶️', name: 'YouTube' },
                { keys: ['twitch'], icon: '🟣', name: 'Twitch' }
            ];
            for (var i = 0; i < platforms.length; i++) {
                for (var j = 0; j < platforms[i].keys.length; j++) {
                    if (u.indexOf(platforms[i].keys[j]) !== -1) {
                        icon.textContent = platforms[i].icon;
                        tag.textContent = platforms[i].name;
                        tag.style.display = 'inline';
                        return;
                    }
                }
            }
            icon.textContent = '🔗';
            tag.style.display = 'none';
        }

        // -- AI 生成：参考图上传 --
        function renderRefUpload() {
            if (refImage) {
                renderRefPreview();
                return;
            }
            actionSlot.innerHTML = 
                '<div class="action-ref-upload" id="refUploadZone">' +
                    '<input type="file" accept="image/*" id="refFileInput">' +
                    '<span class="ref-upload-icon">🖼️</span>' +
                    '<span class="ref-upload-text">上传参考图</span>' +
                    '<span class="ref-upload-hint">（可选）</span>' +
                '</div>';
            var refZone = document.getElementById('refUploadZone');
            var refInput = document.getElementById('refFileInput');
            refZone.addEventListener('click', function() { refInput.click(); });
            refInput.addEventListener('change', function(e) {
                if (e.target.files[0]) {
                    refImage = e.target.files[0];
                    renderRefPreview();
                }
            });
        }

        function renderRefPreview() {
            var url = URL.createObjectURL(refImage);
            actionSlot.innerHTML = 
                '<div class="ref-preview">' +
                    '<img class="ref-preview-thumb" src="' + url + '" alt="参考图">' +
                    '<span class="ref-preview-name">' + escHTML(refImage.name) + '</span>' +
                    '<button class="ref-preview-remove" id="refRemoveBtn" title="移除">' +
                        '<svg width="10" height="10" viewBox="0 0 12 12" fill="none"><path d="M2 2L10 10M10 2L2 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>' +
                    '</button>' +
                '</div>';
            document.getElementById('refRemoveBtn').addEventListener('click', function() {
                refImage = null;
                renderRefUpload();
            });
        }

        // ===== Config Capsules 胶囊渲染 =====
        function renderCapsules(config) {
            configValues = {};
            config.forEach(function(c) {
                configValues[c.key] = c.options[0].value;
            });
            configCapsules.innerHTML = config.map(function(c, idx) {
                return '<div class="config-capsule" data-key="' + c.key + '" data-idx="' + idx + '">' +
                    '<span class="capsule-value">' + c.options[0].text + '</span>' +
                    '<span class="capsule-arrow">▾</span>' +
                    '<div class="capsule-dropdown" id="capsuleDrop_' + c.key + '">' +
                        c.options.map(function(o, oi) {
                            return '<button class="capsule-dropdown-item' + (oi === 0 ? ' selected' : '') + '" data-value="' + o.value + '" data-text="' + escHTML(o.text) + '">' + escHTML(o.text) + '</button>';
                        }).join('') +
                    '</div>' +
                '</div>';
            }).join('');

            // 绑定胶囊点击
            configCapsules.querySelectorAll('.config-capsule').forEach(function(capsule) {
                capsule.addEventListener('click', function(e) {
                    e.stopPropagation();
                    var dropdown = capsule.querySelector('.capsule-dropdown');
                    var isOpen = dropdown.classList.contains('show');
                    // 关闭所有
                    closeAllDropdowns();
                    if (!isOpen) {
                        dropdown.classList.add('show');
                        capsule.classList.add('open');
                    }
                });
                // 下拉选项点击
                capsule.querySelectorAll('.capsule-dropdown-item').forEach(function(item) {
                    item.addEventListener('click', function(e) {
                        e.stopPropagation();
                        var key = capsule.dataset.key;
                        var val = item.dataset.value;
                        var txt = item.dataset.text;
                        configValues[key] = val;
                        capsule.querySelector('.capsule-value').textContent = txt;
                        // 标记已修改（非默认值）
                        var config = skills[currentSkill].config;
                        var cfgItem = config.find(function(c) { return c.key === key; });
                        if (cfgItem && val !== cfgItem.options[0].value) {
                            capsule.classList.add('modified');
                        } else {
                            capsule.classList.remove('modified');
                        }
                        // 更新选中态
                        capsule.querySelectorAll('.capsule-dropdown-item').forEach(function(d) { d.classList.remove('selected'); });
                        item.classList.add('selected');
                        closeAllDropdowns();
                    });
                });
            });
        }

        function closeAllDropdowns() {
            document.querySelectorAll('.capsule-dropdown.show').forEach(function(d) { d.classList.remove('show'); });
            document.querySelectorAll('.config-capsule.open').forEach(function(c) { c.classList.remove('open'); });
        }

        // 点击外部关闭胶囊下拉
        document.addEventListener('click', function() { closeAllDropdowns(); });

        // ===== 渲染快捷提示词 =====
        function renderPrompts(prompts) {
            promptsChips.innerHTML = prompts.map(function(p) {
                return '<button class="create-prompt-chip" data-text="' + escHTML(p.text) + '">' + 
                    p.icon + ' ' + escHTML(p.text) + 
                    '<span class="chip-arrow">→</span></button>';
            }).join('');
            promptsChips.querySelectorAll('.create-prompt-chip').forEach(function(chip) {
                chip.addEventListener('click', function() {
                    inputEl.value = this.dataset.text;
                    charCount.textContent = inputEl.value.length;
                    inputEl.focus();
                    this.style.transform = 'scale(0.95)';
                    var c = chip;
                    setTimeout(function() { c.style.transform = ''; }, 150);
                });
            });
        }

        // ===== 渲染能力标签 =====
        function renderCaps(caps) {
            capsEl.innerHTML = caps.map(function(c) {
                return '<span class="create-cap"><span class="create-cap-dot"></span> ' + c + '</span>';
            }).join('');
        }

        function escHTML(str) {
            var div = document.createElement('div');
            div.appendChild(document.createTextNode(str));
            return div.innerHTML;
        }

        // ===== 意图识别 + 路由跳转 =====
        document.getElementById('createSubmitBtn').addEventListener('click', handleSubmit);
        inputEl.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSubmit();
            }
        });

        function handleSubmit() {
            var text = inputEl.value.trim();
            var skill = skills[currentSkill];
            var detectedSkill = detectIntent(text);
            if (detectedSkill && detectedSkill !== currentSkill) {
                currentSkill = detectedSkill;
                skill = skills[detectedSkill];
                document.querySelectorAll('.skill-pill').forEach(function(p) { p.classList.remove('active'); });
                document.querySelector('[data-skill="' + detectedSkill + '"]').classList.add('active');
                renderSkill(detectedSkill);
            }

            var url = skill.url;
            var params = [];
            if (text) params.push('prompt=' + encodeURIComponent(text));
            // 收集胶囊配置值
            Object.keys(configValues).forEach(function(key) {
                params.push(key + '=' + encodeURIComponent(configValues[key]));
            });
            // 直播链接
            if (currentSkill === 'livestream' && liveLink) {
                params.push('liveUrl=' + encodeURIComponent(liveLink));
            }
            if (params.length) url += '?' + params.join('&');
            window.location.href = url;
        }

        // ===== 简易意图识别 =====
        function detectIntent(text) {
            if (!text) return null;
            var t = text.toLowerCase();
            var translateKw = ['翻译', '译制', '多语言', '配音', '字幕', '本地化', '英文', '日文', '英语', '日语', '韩语', '法语', '德语', '西班牙语', 'translate', 'dub'];
            var liveKw = ['直播', '监控', '剪辑', '录像', '高光', '精彩片段', '抖音', '快手', 'bilibili', 'b站', '带货', '商品讲解', 'livestream', 'live'];
            var genKw = ['生成', '创作', '脚本', '广告', '故事', '产品图', 'vlog', '文案', '制作视频', '做一个视频', 'generate', 'create'];

            var scores = { translate: 0, livestream: 0, generate: 0 };
            translateKw.forEach(function(kw) { if (t.indexOf(kw) !== -1) scores.translate++; });
            liveKw.forEach(function(kw) { if (t.indexOf(kw) !== -1) scores.livestream++; });
            genKw.forEach(function(kw) { if (t.indexOf(kw) !== -1) scores.generate++; });

            var max = Math.max(scores.translate, scores.livestream, scores.generate);
            if (max === 0) return null;
            if (scores.translate === max) return 'translate';
            if (scores.livestream === max) return 'livestream';
            return 'generate';
        }

        // ===== 工具栏上传按钮（作为备用入口） =====
        document.getElementById('uploadBtn').addEventListener('click', function() {
            if (currentSkill === 'translate') {
                // 触发 Action Slot 里的上传
                var zoneInput = document.getElementById('uploadZoneInput');
                if (zoneInput) { zoneInput.click(); return; }
                // 如果已有文件，创建新的
                var fi = document.createElement('input');
                fi.type = 'file';
                fi.accept = 'video/*,.mp4,.mov,.avi,.mkv,.flv,.wmv';
                fi.onchange = function(e) {
                    if (e.target.files[0]) {
                        uploadedFile = e.target.files[0];
                        renderUploadPreview();
                    }
                };
                fi.click();
            } else if (currentSkill === 'generate') {
                var ri = document.getElementById('refFileInput');
                if (ri) { ri.click(); return; }
                var fi2 = document.createElement('input');
                fi2.type = 'file';
                fi2.accept = 'image/*';
                fi2.onchange = function(e) {
                    if (e.target.files[0]) {
                        refImage = e.target.files[0];
                        renderRefPreview();
                    }
                };
                fi2.click();
            } else {
                var fi3 = document.createElement('input');
                fi3.type = 'file';
                fi3.accept = 'video/*,image/*';
                fi3.onchange = function(e) {
                    if (e.target.files[0]) {
                        inputEl.value = (inputEl.value ? inputEl.value + '\n' : '') + '📎 ' + e.target.files[0].name;
                        charCount.textContent = inputEl.value.length;
                    }
                };
                fi3.click();
            }
        });

        // ===== 工具栏链接按钮 =====
        document.getElementById('linkBtn').addEventListener('click', function() {
            if (currentSkill === 'livestream') {
                // 聚焦 Action Slot 里的链接输入
                var li = document.getElementById('linkBarInput');
                if (li) { li.focus(); return; }
            }
            var url = prompt('请粘贴视频/直播链接：');
            if (url && url.trim()) {
                if (currentSkill === 'livestream') {
                    liveLink = url.trim();
                    renderLinkBar();
                } else {
                    inputEl.value = (inputEl.value ? inputEl.value + '\n' : '') + '🔗 ' + url.trim();
                    charCount.textContent = inputEl.value.length;
                }
            }
        });

        // ===== 初始渲染 =====
        renderSkill(currentSkill);

    })();
    </script>
    <script>
    (function() {
        var avatar = document.getElementById('userAvatar');
        var avatarLetter = document.getElementById('userAvatarLetter');
        var dropdown = document.getElementById('userDropdown');
        var dropdownAvatar = document.getElementById('dropdownAvatar');
        var dropdownName = document.getElementById('dropdownName');
        var dropdownHint = document.getElementById('dropdownHint');
        var loginBtn = document.getElementById('userLoginBtn');
        var logoutBtn = document.getElementById('userLogoutBtn');

        function updateUserUI() {
            var raw = localStorage.getItem('tideo_user');
            if (raw) {
                try {
                    var user = JSON.parse(raw);
                    var initial = user.avatar || user.name.charAt(0).toUpperCase();
                    avatarLetter.textContent = initial;
                    dropdownAvatar.textContent = initial;
                    dropdownName.textContent = user.name;
                    dropdownHint.textContent = '已登录';
                    loginBtn.style.display = 'none';
                    logoutBtn.style.display = 'flex';
                    avatar.title = user.name;
                } catch(e) {}
            } else {
                avatarLetter.textContent = 'U';
                dropdownAvatar.textContent = 'U';
                dropdownName.textContent = '未登录';
                dropdownHint.textContent = '点击登录';
                loginBtn.style.display = 'flex';
                logoutBtn.style.display = 'none';
                avatar.title = '用户';
            }
        }

        // 点击头像切换下拉
        avatar.addEventListener('click', function(e) {
            e.stopPropagation();
            dropdown.classList.toggle('show');
        });

        // 点击外部关闭
        document.addEventListener('click', function(e) {
            if (!dropdown.contains(e.target) && e.target !== avatar) {
                dropdown.classList.remove('show');
            }
        });

        // 登录按钮
        loginBtn.addEventListener('click', function(e) {
            e.preventDefault();
            window.location.href = 'login.html';
        });

        // 退出登录
        logoutBtn.addEventListener('click', function(e) {
            e.preventDefault();
            localStorage.removeItem('tideo_user');
            updateUserUI();
            dropdown.classList.remove('show');
        });

        // 初始化
        updateUserUI();

        // 监听 storage 变化（跨标签页同步）
        window.addEventListener('storage', function(e) {
            if (e.key === 'tideo_user') updateUserUI();
        });
    })();
    </script>
